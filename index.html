function resetRound() {
  world.goods = []; world.bads = []; world.gaps = []; world.retrs = []; world.negs = [];
  world.portals = [];
  world.particles = []; world.msgs = [];
  world.collected = 0; world.mistakes = 0; world.nfrHits = 0; world.confidence = 0;
  world.portalMissed = 0;
  world.spawnTimer = 0;
  world.portalSpawned = false;
  world.questionBannerAnim = 1;
  world.readDuration = getReadDuration();
  world.readTimer = world.readDuration;
  world.speed = 2.8 + Math.min(world.level * 0.15, 1.6);
  dany.reset();
}

/* ---------- Update / Draw ---------- */
function update() {
  if (state === STATE.TUTORIAL) { updateTutorial(); return; }
  if (state !== STATE.PLAY) return;

  // 2 second pause after each new question so the user can read it
  if (world.readTimer > 0) {
    world.readTimer--;
    // Keep message/particle animations ticking so they don't look frozen
    for (const p of world.particles) p.update();
    world.particles = world.particles.filter(p => p.life > 0);
    for (const m of world.msgs) m.update();
    world.msgs = world.msgs.filter(m => m.life > 0);
    return;
  }

  // Awaiting first user input on the session's first question — freeze game
  if (world.awaitingStart) {
    for (const p of world.particles) p.update();
    world.particles = world.particles.filter(p => p.life > 0);
    for (const m of world.msgs) m.update();
    world.msgs = world.msgs.filter(m => m.life > 0);
    return;
  }

  world.roundFrames++;
  dany.update();
  world.spawnTimer--;
  if (world.buddyCooldown > 0) world.buddyCooldown--;
  if (world.featuredCooldown > 0) world.featuredCooldown--;
  if (world.shield > 0) world.shield--;

  // Session countdown (2 min per session)
  world.sessionTime--;
  if (world.sessionTime <= 0 && state === STATE.PLAY) {
    endSession();
    return;
  }

  // Fade question banner
  if (world.questionBannerAnim > 0) world.questionBannerAnim -= 0.004;

  // Only spawn regular content if portal hasn't appeared yet
  if (world.spawnTimer <= 0 && !world.portalSpawned) {
    spawnWave();
    const baseInterval = 72 - Math.min(28, world.level * 3);
    world.spawnTimer = Math.round(baseInterval * DEBUG.spawnMult);
  }

  const s = world.speed * DEBUG.speedMult;

  // Goods
  for (const g of world.goods) g.update(s);
  for (const g of world.goods) {
    if (!g.collected && dany.invul === 0 && hits(dany.hitbox(), g.hitbox())) {
      g.collected = true;
      world.collected++;
      world.combo++;
      if (world.combo > world.maxCombo) world.maxCombo = world.combo;
      const mult = comboMultiplier(world.combo);
      const points = Math.round(100 * mult);
      world.score += points;
      world.confidence = Math.min(100, world.confidence + (100 / world.question.target));
      // Combo gently bumps world speed (caps at 4.2 via update)
      world.speed = Math.min(world.speed + 0.02, 5.0);
      sfx.good();
      for (let i = 0; i < 14; i++) world.particles.push(new Particle(g.x, g.y, 'rgba(34, 197, 94, ALPHA)'));
      const msg = mult > 1 ? `+${points}  x${mult}!` : `+${points}  Great article!`;
      world.msgs.push(new FloatMsg(g.x, g.y - 40, msg, 'rgba(34, 197, 94, ALPHA)'));
      if (world.collected >= world.question.target && !world.portalSpawned) {
        spawnPortal();
      }
    }
  }
  world.goods = world.goods.filter(g => !g.collected && g.x > -80);

  // Featured articles (worth 3 goods, count as 3 toward target)
  for (const f of world.featured) f.update(s);
  for (const f of world.featured) {
    if (!f.collected && dany.invul === 0 && hits(dany.hitbox(), f.hitbox())) {
      f.collected = true;
      world.collected += 3;
      world.combo += 3;
      if (world.combo > world.maxCombo) world.maxCombo = world.combo;
      const mult = comboMultiplier(world.combo);
      const points = Math.round(300 * mult);
      world.score += points;
      world.confidence = Math.min(100, world.confidence + (300 / world.question.target));
      sfx.good();
      for (let i = 0; i < 25; i++) world.particles.push(new Particle(f.x, f.y, 'rgba(250, 204, 21, ALPHA)'));
      world.msgs.push(new FloatMsg(f.x, f.y - 48, `+${points}  FEATURED!  x${mult}`, 'rgba(250, 204, 21, ALPHA)'));
      if (world.collected >= world.question.target && !world.portalSpawned) {
        spawnPortal();
      }
    }
  }
  world.featured = world.featured.filter(f => !f.collected && f.x > -80);

  // TextBuddy power-up: converts bads to goods, clears other detractors, 5s shield
  for (const tb of world.buddies) tb.update(s);
  for (const tb of world.buddies) {
    if (!tb.collected && hits(dany.hitbox(), tb.hitbox())) {
      tb.collected = true;
      sfx.good();

      // Convert bad articles into good articles in place
      const converted = [];
      for (const b of world.bads) {
        const newTitle = world.question.good[Math.floor(Math.random() * world.question.good.length)];
        const newGood = new GoodArticle(b.x, b.y, newTitle);
        // Start with just-converted flash visual
        newGood.justConverted = 30; // frames of extra sparkle
        world.goods.push(newGood);
        converted.push({ x: b.x, y: b.y });
      }
      // Burst conversion particles at each bad location
      for (const pos of converted) {
        for (let i = 0; i < 14; i++) {
          world.particles.push(new Particle(pos.x, pos.y, 'rgba(34, 197, 94, ALPHA)'));
        }
        for (let i = 0; i < 8; i++) {
          world.particles.push(new Particle(pos.x, pos.y, 'rgba(247, 180, 174, ALPHA)'));
        }
      }
      world.bads = []; // bads are now goods

      // Clear non-article detractors (gaps, retrievals, negative feedback)
      for (const arr of [world.gaps, world.retrs, world.negs]) {
        for (const item of arr) {
          for (let i = 0; i < 6; i++) {
            world.particles.push(new Particle(item.x, item.y, 'rgba(247, 180, 174, ALPHA)'));
          }
        }
      }
      world.gaps = []; world.retrs = []; world.negs = [];

      world.shield = 300; // 5 seconds
      world.score += 150;

      const label = converted.length > 0
        ? `TEXTBUDDY  ·  ${converted.length} article${converted.length > 1 ? 's' : ''} fixed!  +150`
        : 'TEXTBUDDY  ·  Content filtered!  +150';
      world.msgs.push(new FloatMsg(W / 2, H / 2 - 60, label, 'rgba(247, 180, 174, ALPHA)'));

      for (let i = 0; i < 40; i++) world.particles.push(new Particle(tb.x, tb.y, 'rgba(247, 180, 174, ALPHA)'));
    }
  }
  world.buddies = world.buddies.filter(tb => !tb.collected && tb.x > -80);

  // Bads
  for (const b of world.bads) b.update(s);
  for (const b of world.bads) {
    if (!b.hit && dany.invul === 0 && world.shield === 0 && hits(dany.hitbox(), b.hitbox())) {
      b.hit = true;
      world.mistakes++;
      world.combo = 0; // combo reset on any detractor
      world.score = Math.max(0, world.score - 50);
      world.confidence = Math.max(0, world.confidence - 8);
      dany.invul = 60;
      sfx.bad();
      for (let i = 0; i < 12; i++) world.particles.push(new Particle(b.x, b.y, 'rgba(239, 68, 68, ALPHA)'));
      world.msgs.push(new FloatMsg(b.x, b.y - 40, '-50  Bad source!', 'rgba(239, 68, 68, ALPHA)'));
    }
  }
  world.bads = world.bads.filter(b => !b.hit && b.x > -80);

  // Gaps
  for (const g of world.gaps) g.update(s);
  for (const g of world.gaps) {
    if (!g.hit && dany.invul === 0 && world.shield === 0 && hits(dany.hitbox(), g.hitbox())) {
      g.hit = true;
      world.mistakes++;
      world.combo = 0;
      world.confidence = Math.max(0, world.confidence - 5);
      dany.stunned = 35;
      dany.invul = 60;
      sfx.gap();
      world.msgs.push(new FloatMsg(g.x, g.y - 50, 'Knowledge gap!', 'rgba(148, 163, 184, ALPHA)'));
    }
  }
  world.gaps = world.gaps.filter(g => !g.hit && g.x > -120);

  // Retrieval issues
  for (const r of world.retrs) r.update(s);
  for (const r of world.retrs) {
    if (!r.hit && dany.invul === 0 && world.shield === 0 && hits(dany.hitbox(), r.hitbox())) {
      r.hit = true;
      world.mistakes++;
      world.combo = 0;
      world.confidence = Math.max(0, world.confidence - 10);
      world.score = Math.max(0, world.score - 30);
      dany.stunned = 20;
      dany.invul = 55;
      sfx.retr();
      for (let i = 0; i < 10; i++) world.particles.push(new Particle(r.x, r.y, 'rgba(245, 158, 11, ALPHA)'));
      world.msgs.push(new FloatMsg(r.x, r.y - 40, 'Retrieval issue!', 'rgba(245, 158, 11, ALPHA)'));
    }
  }
  world.retrs = world.retrs.filter(r => !r.hit && r.x > -80);

  // Negative feedback
  for (const n of world.negs) n.update(s);
  for (const n of world.negs) {
    if (!n.hit && dany.invul === 0 && world.shield === 0 && hits(dany.hitbox(), n.hitbox())) {
      n.hit = true;
      world.mistakes++;
      world.nfrHits++;
      world.combo = 0;
      world.confidence = Math.max(0, world.confidence - 7);
      world.score = Math.max(0, world.score - 40);
      dany.invul = 55;
      sfx.bad();
      for (let i = 0; i < 14; i++) world.particles.push(new Particle(n.x, n.y, 'rgba(239, 68, 68, ALPHA)'));
      world.msgs.push(new FloatMsg(n.x, n.y - 40, '-40  User disliked!', 'rgba(239, 68, 68, ALPHA)'));
    }
  }
  world.negs = world.negs.filter(n => !n.hit && n.x > -80);

  // Portal
  for (const p of world.portals) p.update(s);
  for (const p of world.portals) {
    if (!p.passed && hits(dany.hitbox(), p.hitbox())) {
      p.passed = true;
      // Burst of pink/blue particles on entry
      for (let i = 0; i < 30; i++) {
        world.particles.push(new Particle(p.x, p.y, 'rgba(247, 180, 174, ALPHA)'));
        world.particles.push(new Particle(p.x, p.y, 'rgba(0, 94, 184, ALPHA)'));
      }
      deliverAnswer();
    }
  }
  // Respawn portal if it went off-screen without being touched - with quality penalty
  if (world.portalSpawned && world.portals.length > 0 && world.portals[0].x < -200 && !world.portals[0].passed) {
    world.portals = [];
    world.confidence = Math.max(0, world.confidence - 15);
    world.mistakes++;
    world.nfrHits++;
    world.combo = 0; // portal miss breaks the combo
    world.portalMissed = (world.portalMissed || 0) + 1;
    sfx.bad();
    world.msgs.push(new FloatMsg(W / 2, H / 2 - 40, `Portal missed!  -15% confidence`, 'rgba(239, 68, 68, ALPHA)'));
    const py = Math.max(120, Math.min(H - 120, dany.y));
    world.portals.push(new AnswerPortal(W + 100, py));
  }
  world.portals = world.portals.filter(p => !p.passed);

  // Flashes
  for (const f of world.flashes) f.update();
  world.flashes = world.flashes.filter(f => f.life > 0);

  // Particles & messages
  for (const p of world.particles) p.update();
  world.particles = world.particles.filter(p => p.life > 0);
  for (const m of world.msgs) m.update();
  world.msgs = world.msgs.filter(m => m.life > 0);

  // Gentle speed ramp
  world.speed = Math.min(world.speed + 0.0002, 5.0);
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();

  if (state === STATE.BOOT) { drawBoot(); return; }
  if (state === STATE.LEADERBOARD) { drawLeaderboard(); return; }

  if (state === STATE.TUTORIAL) {
    for (const g of world.gaps) g.draw();
    for (const r of world.retrs) r.draw();
    for (const b of world.bads) b.draw();
    for (const n of world.negs) n.draw();
    for (const p of world.portals) p.draw();
    for (const g of world.goods) g.draw();
    for (const p of world.particles) p.draw();
    for (const m of world.msgs) m.draw();
    dany.draw();
    drawTutorialOverlay();
    drawTutorialSkipBtn();
    return;
  }

  // World objects
  for (const g of world.gaps) g.draw();
  for (const r of world.retrs) r.draw();
  for (const b of world.bads) b.draw();
  for (const n of world.negs) n.draw();
  for (const p of world.portals) p.draw();
  for (const g of world.goods) g.draw();
  for (const f of world.featured) f.draw();
  for (const tb of world.buddies) tb.draw();
  for (const p of world.particles) p.draw();
  for (const m of world.msgs) m.draw();

  dany.draw();

  // Debug hitboxes
  if (DEBUG.showHitboxes) drawHitboxes();

  drawHUD();
  drawQuestionBanner();
  drawReadOverlay();
  drawResetButton();

  for (const f of world.flashes) f.draw();

  if (state === STATE.PAUSE) drawPause();
  if (state === STATE.OVER) drawOver();
  // On mobile we use the HTML overlay (#mobileNameEntry) instead of the canvas-drawn UI
  if (state === STATE.NAME_ENTRY && !isMobile) drawNameEntry();
  if (state === STATE.SESSION_END) drawSessionEnd();
}

/* ---------- Reset button (visible in-game, click or press R) ---------- */
function drawResetButton() {
  if (state === STATE.BOOT) return;
  const b = RESET_BTN;
  const pulse = 1 + Math.sin(performance.now() / 800) * 0.02;
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.scale(pulse, pulse);

  // Background circle
  ctx.fillStyle = 'rgba(10, 15, 30, 0.75)';
  ctx.beginPath(); ctx.arc(0, 0, b.r, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(247, 180, 174, 0.55)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(0, 0, b.r, 0, Math.PI*2); ctx.stroke();

  // Reset icon (circular arrow opening at top-right)
  ctx.strokeStyle = 'rgba(247, 180, 174, 0.9)';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(0, 0, 7, Math.PI * 0.2, Math.PI * 1.75, false);
  ctx.stroke();
  // Arrow head (at end of arc, top-right)
  const endA = Math.PI * 1.75;
  const ex = Math.cos(endA) * 7;
  const ey = Math.sin(endA) * 7;
  ctx.fillStyle = 'rgba(247, 180, 174, 0.9)';
  ctx.beginPath();
  ctx.moveTo(ex, ey);
  ctx.lineTo(ex - 4, ey - 2);
  ctx.lineTo(ex + 1, ey - 5);
  ctx.closePath();
  ctx.fill();

  ctx.restore();

  // Label below
  ctx.fillStyle = 'rgba(255, 255, 255, 0.45)';
  ctx.font = F(9, 700);
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(PROMPTS.reset, b.x, b.y + b.r + 4);
}

/* ---------- Debug hitbox overlay ---------- */
function drawHitboxes() {
  ctx.lineWidth = 1;
  const draw = (arr, color) => {
    ctx.strokeStyle = color;
    for (const o of arr) {
      const h = o.hitbox();
      ctx.strokeRect(h.x, h.y, h.w, h.h);
    }
  };
  ctx.strokeStyle = '#00ffff';
  const d = dany.hitbox();
  ctx.strokeRect(d.x, d.y, d.w, d.h);
  draw(world.goods,    '#22c55e');
  draw(world.featured, '#facc15');
  draw(world.buddies,  '#f7b4ae');
  draw(world.bads,     '#ef4444');
  draw(world.gaps,     '#94a3b8');
  draw(world.retrs,    '#f59e0b');
  draw(world.negs,     '#dc2626');
  draw(world.portals,  '#f7b4ae');
}

/* ---------- Read overlay: Danoner chat bubble with typing effect (3s) ---------- */
function drawReadOverlay() {
  if (state !== STATE.PLAY) return;
  if (world.readTimer <= 0 && !world.awaitingStart) return;

  const RD = world.readDuration;
  const t = Math.max(0, world.readTimer);              // counts down to 0
  const elapsed = world.awaitingStart ? RD : RD - t;
  const FADE_IN = 14;
  const FADE_OUT = 24;

  // Overlay alpha: fade in (skip fade-out while awaitingStart)
  let alpha = 1;
  if (elapsed < FADE_IN) alpha = elapsed / FADE_IN;
  else if (!world.awaitingStart && t < FADE_OUT) alpha = t / FADE_OUT;
  alpha = Math.max(0, Math.min(1, alpha));

  // Scale pop-in (subtle)
  let scale = 1;
  if (elapsed < FADE_IN) {
    const k = elapsed / FADE_IN;
    scale = 0.94 + 0.06 * (1 - Math.pow(1 - k, 3));
  }

  // Dim the game world
  ctx.fillStyle = `rgba(10, 15, 30, ${0.78 * alpha})`;
  ctx.fillRect(0, 0, W, H);

  // Soft pink spotlight
  const spot = ctx.createRadialGradient(W/2, H/2, 40, W/2, H/2, 460);
  spot.addColorStop(0, `rgba(247, 180, 174, ${0.16 * alpha})`);
  spot.addColorStop(1, 'rgba(247, 180, 174, 0)');
  ctx.fillStyle = spot;
  ctx.fillRect(0, 0, W, H);

  // Typing timing
  const TYPE_INTRO = 28;                  // frames showing typing dots before text begins
  const FADE_OUT_START = RD - FADE_OUT;
  const MIN_READ_AFTER = 30;              // at least 0.5s of full text before fade
  const maxTypeFrames = FADE_OUT_START - TYPE_INTRO - MIN_READ_AFTER;
  const qText = world.question.q;
  const qLen = qText.length;
  // 2 frames per char, bounded so it always fits in the allowed window
  const typeDurationFrames = Math.min(maxTypeFrames, Math.max(40, qLen * 2));
  const charsPerFrame = qLen / typeDurationFrames;

  const typeStart = TYPE_INTRO;
  const typeEnd = typeStart + typeDurationFrames;
  const charsShown = elapsed >= typeStart
    ? Math.min(qLen, Math.floor((elapsed - typeStart) * charsPerFrame))
    : 0;
  const typing = elapsed < typeEnd;
  const shownText = qText.slice(0, charsShown);
  const cursorBlink = Math.floor(performance.now() / 380) % 2 === 0;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(W / 2, H / 2);
  ctx.scale(scale, scale);

  // ===== Layout =====
  const avatarR = 28;
  const gap = 18;
  const bubbleMaxW = 640;
  const bubblePadX = 26;
  const bubblePadY = 22;
  const lineHeight = 34;

  // Word-wrap the full text (not just shown) to determine bubble dimensions,
  // so the bubble doesn't jump size as the text appears.
  ctx.font = F(22, 700);
  const words = qText.split(' ');
  const lines = [];
  let line = '';
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > bubbleMaxW - bubblePadX*2 && line) {
      lines.push(line);
      line = w;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);

  // Actual bubble width = widest line + padding (min 260)
  let widest = 0;
  for (const ln of lines) widest = Math.max(widest, ctx.measureText(ln).width);
  const bubbleW = Math.max(260, Math.min(bubbleMaxW, widest + bubblePadX * 2));
  const bubbleH = lines.length * lineHeight + bubblePadY * 2;

  // Total content width (avatar + gap + bubble)
  const contentW = avatarR * 2 + gap + bubbleW;
  const originX = -contentW / 2;
  const avatarCX = originX + avatarR;
  const avatarCY = -bubbleH / 2 + avatarR;  // aligned with top of bubble
  const bubbleX = originX + avatarR * 2 + gap;
  const bubbleY = -bubbleH / 2;

  // ===== Draw Danoner avatar =====
  // Label "DANONER" above avatar
  ctx.fillStyle = C.pink;
  ctx.font = F(10, 700);
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('DANONER', avatarCX, avatarCY - avatarR - 10);

  // Soft pink aura behind avatar
  const aura = ctx.createRadialGradient(avatarCX, avatarCY, 6, avatarCX, avatarCY, avatarR + 14);
  aura.addColorStop(0, 'rgba(247, 180, 174, 0.35)');
  aura.addColorStop(1, 'rgba(247, 180, 174, 0)');
  ctx.fillStyle = aura;
  ctx.beginPath(); ctx.arc(avatarCX, avatarCY, avatarR + 14, 0, Math.PI*2); ctx.fill();

  // Avatar circle (Danone blue)
  ctx.fillStyle = C.blue;
  ctx.beginPath(); ctx.arc(avatarCX, avatarCY, avatarR, 0, Math.PI*2); ctx.fill();

  // White ring border
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.35)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(avatarCX, avatarCY, avatarR, 0, Math.PI*2); ctx.stroke();

  // Person silhouette (head + shoulders)
  ctx.fillStyle = 'rgba(255, 255, 255, 0.92)';
  // Head
  ctx.beginPath();
  ctx.arc(avatarCX, avatarCY - avatarR * 0.22, avatarR * 0.28, 0, Math.PI*2);
  ctx.fill();
  // Shoulders (half-circle at bottom)
  ctx.beginPath();
  ctx.arc(avatarCX, avatarCY + avatarR * 0.55, avatarR * 0.58, Math.PI, Math.PI * 2);
  ctx.closePath();
  ctx.fill();

  // ===== Draw speech bubble =====
  // Bubble shadow
  ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
  roundRect(ctx, bubbleX + 2, bubbleY + 4, bubbleW, bubbleH, 16); ctx.fill();

  // Bubble body
  ctx.fillStyle = 'rgba(255, 255, 255, 0.98)';
  roundRect(ctx, bubbleX, bubbleY, bubbleW, bubbleH, 16); ctx.fill();

  // Bubble tail pointing left toward avatar
  ctx.beginPath();
  ctx.moveTo(bubbleX, avatarCY - 6);
  ctx.lineTo(bubbleX - 12, avatarCY + 2);
  ctx.lineTo(bubbleX, avatarCY + 10);
  ctx.closePath();
  ctx.fill();

  // Bubble border (subtle)
  ctx.strokeStyle = 'rgba(0, 0, 0, 0.06)';
  ctx.lineWidth = 1;
  roundRect(ctx, bubbleX, bubbleY, bubbleW, bubbleH, 16); ctx.stroke();

  // ===== Draw text inside bubble =====
  ctx.fillStyle = '#1a2335';
  ctx.font = F(22, 700);
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  const textX = bubbleX + bubblePadX;

  if (charsShown === 0) {
    // Typing dots indicator
    const cy = bubbleY + bubbleH / 2;
    for (let i = 0; i < 3; i++) {
      const phase = performance.now() / 200 + i * 0.6;
      const by = cy + Math.sin(phase) * 4;
      const a = 0.35 + (Math.sin(phase) + 1) * 0.25;
      ctx.fillStyle = `rgba(100, 116, 139, ${a})`;
      ctx.beginPath();
      ctx.arc(textX + 6 + i * 14, by, 4, 0, Math.PI*2);
      ctx.fill();
    }
  } else {
    // Rewrap just the shown text into lines (preserve same layout as full text)
    let sLine = '';
    const sLines = [];
    const sWords = shownText.split(' ');
    for (const w of sWords) {
      const test = sLine ? sLine + ' ' + w : w;
      if (ctx.measureText(test).width > bubbleMaxW - bubblePadX*2 && sLine) {
        sLines.push(sLine);
        sLine = w;
      } else {
        sLine = test;
      }
    }
    if (sLine) sLines.push(sLine);

    for (let i = 0; i < sLines.length; i++) {
      const y = bubbleY + bubblePadY + (i + 1) * lineHeight - 8;
      let lineText = sLines[i];
      // Append blinking cursor at end of last line while typing or when focus
      if (i === sLines.length - 1 && (typing || cursorBlink)) {
        const cw = ctx.measureText(lineText).width;
        ctx.fillText(lineText, textX, y);
        if (typing || cursorBlink) {
          ctx.fillStyle = C.pink;
          ctx.fillRect(textX + cw + 2, y - lineHeight + 12, 2, lineHeight - 8);
          ctx.fillStyle = '#1a2335';
        }
      } else {
        ctx.fillText(lineText, textX, y);
      }
    }
  }

  // ===== Progress bar below =====
  const barW = 260, barH = 3;
  const barY = bubbleY + bubbleH + 26;
  const progress = Math.max(0, Math.min(1, 1 - (t / RD)));
  ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
  roundRect(ctx, -barW / 2, barY, barW, barH, 2); ctx.fill();
  const barGrad = ctx.createLinearGradient(-barW/2, 0, barW/2, 0);
  barGrad.addColorStop(0, C.pink);
  barGrad.addColorStop(1, '#facc15');
  ctx.fillStyle = barGrad;
  roundRect(ctx, -barW / 2, barY, barW * progress, barH, 2); ctx.fill();

  // Countdown hint OR tutorial + "press space to start" prompt
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  if (world.awaitingStart) {
    // Mini-tutorial above the start prompt
    ctx.fillStyle = 'rgba(247, 180, 174, 0.85)';
    ctx.font = F(10, 700);
    ctx.fillText('HOW TO FLY', 0, barY + 26);

    ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
    ctx.font = F(12, 400);
    const line1 = isMobile
      ? 'Tap the screen to flap. Each tap raises Dany.'
      : 'Tap SPACE to flap. Each tap raises Dany.';
    const line2 = 'Keep tapping to stay airborne — don’t hold.';
    ctx.fillText(line1, 0, barY + 46);
    ctx.fillText(line2, 0, barY + 64);

    // Pulsing start prompt
    const pulse = 0.55 + 0.45 * Math.abs(Math.sin(performance.now() / 280));
    ctx.fillStyle = `rgba(247, 180, 174, ${pulse})`;
    ctx.font = F(13, 700);
    const startText = isMobile ? 'TAP TO START' : 'PRESS SPACE TO START';
    ctx.fillText(startText, 0, barY + 96);
  } else {
    const secsLeft = Math.ceil(t / 60);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
    ctx.font = F(10, 700);
    ctx.fillText(`STARTS IN ${secsLeft}s`, 0, barY + 22);
  }

  ctx.restore();
}

/* ---------- New Question banner (fades in/out on question change) ---------- */
function drawQuestionBanner() {
  if (world.questionBannerAnim <= 0) return;
  const a = Math.min(1, world.questionBannerAnim);

  // Pulsing pink stroke around top HUD question banner
  ctx.save();
  ctx.strokeStyle = `rgba(247, 180, 174, ${a * 0.85})`;
  ctx.lineWidth = 2 + Math.sin(performance.now() / 180) * 1;
  roundRect(ctx, 22, 18, W - 44, 68, 12);
  ctx.stroke();

  // Big prominent pill above HUD - auto-sized to text
  const labelText = 'NEW QUESTION FROM A DANONER';
  ctx.font = F(13, 800);
  const textWidth = ctx.measureText(labelText).width;
  const badgeW = textWidth + 58; // padding + space for pulsing dot
  const badgeH = 34;
  const bx = (W - badgeW) / 2;
  const overshoot = 1 - a;
  const by = 96 + (overshoot * -30);

  ctx.globalAlpha = a;

  // Drop shadow
  ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
  roundRect(ctx, bx + 2, by + 3, badgeW, badgeH, badgeH / 2); ctx.fill();

  // Pink pill
  ctx.fillStyle = C.pink;
  roundRect(ctx, bx, by, badgeW, badgeH, badgeH / 2); ctx.fill();

  // Pulsing dot on left
  const pulse = (Math.sin(performance.now() / 200) + 1) / 2;
  ctx.fillStyle = `rgba(26, 26, 26, ${0.65 + pulse * 0.35})`;
  ctx.beginPath();
  ctx.arc(bx + 20, by + badgeH / 2, 4 + pulse * 1.5, 0, Math.PI * 2);
  ctx.fill();

  // Label (shifted right to accommodate dot)
  ctx.fillStyle = '#1a1a1a';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(labelText, bx + 20 + (badgeW - 20) / 2, by + badgeH / 2 + 1);

  ctx.restore();
}

/* ---------- HUD ---------- */
function drawHUD() {
  // TOP BAR: left = question, right = score/time only
  ctx.fillStyle = 'rgba(10, 15, 30, 0.55)';
  roundRect(ctx, 24, 20, W - 48, 64, 12); ctx.fill();

  // Left: DANONER ASKS + question
  ctx.fillStyle = 'rgba(247, 180, 174, 0.85)';
  ctx.font = F(10, 700);
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('DANONER ASKS', 44, 42);

  ctx.fillStyle = C.white;
  ctx.font = F(17, 700);
  const qText = world.question.q;
  const maxQWidth = W - 360;
  let displayQ = qText;
  if (ctx.measureText(displayQ).width > maxQWidth) {
    while (ctx.measureText(displayQ + '...').width > maxQWidth && displayQ.length > 0) {
      displayQ = displayQ.slice(0, -1);
    }
    displayQ += '...';
  }
  ctx.fillText(displayQ, 44, 66);

  // Right side stats: SCORE | TIME LEFT (with clear separation)
  // TIME LEFT at far right
  const secs = Math.max(0, Math.ceil(world.sessionTime / 60));
  const mm = Math.floor(secs / 60);
  const ss = secs % 60;
  const timeLabel = `${mm}:${String(ss).padStart(2, '0')}`;
  const urgent = secs <= 20;
  const timerColor = urgent
    ? `rgba(247, 180, 174, ${0.8 + Math.sin(performance.now() / 120) * 0.2})`
    : 'rgba(247, 180, 174, 0.85)';

  ctx.textAlign = 'right';
  ctx.fillStyle = timerColor;
  ctx.font = F(10, 700);
  ctx.fillText('TIME LEFT', W - 44, 42);
  ctx.fillStyle = urgent ? C.pink : C.white;
  ctx.font = F(22, 700);
  ctx.fillText(timeLabel, W - 44, 68);

  // SCORE to the left of TIME LEFT
  const scoreRight = W - 160;
  ctx.fillStyle = 'rgba(247, 180, 174, 0.85)';
  ctx.font = F(10, 700);
  ctx.fillText('SCORE', scoreRight, 42);
  ctx.fillStyle = C.white;
  ctx.font = F(20, 700);
  ctx.fillText(`${world.score}`, scoreRight, 66);

  // COMBO badge - prominent floating element below top bar (only when active)
  if (world.combo > 0) {
    const mult = comboMultiplier(world.combo);
    const tone = mult >= 3 ? '#facc15' : mult >= 2 ? '#f59e0b' : '#fb923c';
    const pulse = 1 + Math.sin(performance.now() / 180) * (mult >= 2 ? 0.06 : 0.03);

    // Content text
    const multText = `x${mult}`;
    const comboText = `COMBO ${world.combo}`;

    ctx.font = F(20, 700);
    const multW = ctx.measureText(multText).width;
    ctx.font = F(11, 700);
    const comboW = ctx.measureText(comboText).width;

    const pillW = multW + 24 + comboW + 32;
    const pillH = 34;
    // Centered horizontally below the top bar, to the right of center
    const pillX = W - pillW - 44;
    const pillY = 96;

    ctx.save();
    ctx.translate(pillX + pillW / 2, pillY + pillH / 2);
    ctx.scale(pulse, pulse);

    // Glow aura
    const glow = ctx.createRadialGradient(0, 0, 10, 0, 0, pillW * 0.7);
    glow.addColorStop(0, `rgba(250, 204, 21, ${mult >= 3 ? 0.45 : 0.3})`);
    glow.addColorStop(1, 'rgba(250, 204, 21, 0)');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(0, 0, pillW * 0.7, 0, Math.PI * 2); ctx.fill();

    // Pill body
    ctx.fillStyle = tone;
    roundRect(ctx, -pillW / 2, -pillH / 2, pillW, pillH, pillH / 2); ctx.fill();

    // Multiplier (left side, bigger)
    ctx.fillStyle = '#1a1a1a';
    ctx.font = F(20, 700);
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(multText, -pillW / 2 + 14, 1);

    // Divider dot
    ctx.fillStyle = 'rgba(26, 26, 26, 0.45)';
    ctx.beginPath();
    ctx.arc(-pillW / 2 + 14 + multW + 10, 0, 2.5, 0, Math.PI * 2);
    ctx.fill();

    // Combo count (right side, smaller)
    ctx.fillStyle = '#1a1a1a';
    ctx.font = F(11, 700);
    ctx.fillText(comboText, -pillW / 2 + 14 + multW + 22, 1);

    ctx.restore();
  }

  // BOTTOM: Confidence bar
  const bw = 560, bh = 10, bx = (W - bw) / 2, by = H - 38;

  ctx.fillStyle = 'rgba(247, 180, 174, 0.85)';
  ctx.font = F(10, 700);
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('ANSWER CONFIDENCE', bx, by - 14);

  ctx.textAlign = 'right';
  ctx.fillStyle = C.white;
  ctx.font = F(11, 400);
  ctx.fillText(`${Math.round(world.confidence)}%  ·  ${world.collected}/${world.question.target} articles`, bx + bw, by - 14);

  ctx.fillStyle = 'rgba(255, 255, 255, 0.10)';
  roundRect(ctx, bx, by, bw, bh, 5); ctx.fill();

  const fillW = Math.max(0, (world.confidence / 100) * bw);
  const barGrad = ctx.createLinearGradient(bx, 0, bx + bw, 0);
  barGrad.addColorStop(0, C.blue);
  barGrad.addColorStop(1, C.pink);
  ctx.fillStyle = barGrad;
  roundRect(ctx, bx, by, fillW, bh, 5); ctx.fill();
}

  ctx.font = F(11, 700);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(PROMPTS.controls, W / 2, py + ph - 118);

  // "TRY TUTORIAL" button (above CTA, secondary)
  const tutBtnW = 220, tutBtnH = 30;
  const tutBtnX = (W - tutBtnW) / 2;

  BOOT_TUTORIAL_BTN.x = tutBtnX;
  BOOT_TUTORIAL_BTN.y = tutBtnY;
  BOOT_TUTORIAL_BTN.w = tutBtnW;
  BOOT_TUTORIAL_BTN.h = tutBtnH;
  ctx.fillStyle = 'rgba(63, 143, 217, 0.15)';
  roundRect(ctx, tutBtnX, tutBtnY, tutBtnW, tutBtnH, tutBtnH / 2); ctx.fill();
  ctx.strokeStyle = 'rgba(63, 143, 217, 0.5)';
  ctx.lineWidth = 1;
  roundRect(ctx, tutBtnX, tutBtnY, tutBtnW, tutBtnH, tutBtnH / 2); ctx.stroke();
  ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
  ctx.font = F(11, 700);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('FIRST TIME? TRY TUTORIAL', tutBtnX + tutBtnW / 2, tutBtnY + tutBtnH / 2 + 1);

  // CTA button (primary, bottom)
  const ctaW = 340, ctaH = 44;
  const ctaX = (W - ctaW) / 2;
  const ctaY = py + ph - 44 - 16;

  // Pulse on CTA
  const ctaPulse = 1 + Math.sin(performance.now() / 400) * 0.02;
  ctx.save();
  ctx.translate(ctaX + ctaW / 2, ctaY + ctaH / 2);
  ctx.scale(ctaPulse, ctaPulse);

  // Glow
  const ctaGlow = ctx.createRadialGradient(0, 0, 20, 0, 0, ctaW * 0.7);
  ctaGlow.addColorStop(0, 'rgba(247, 180, 174, 0.35)');
  ctaGlow.addColorStop(1, 'rgba(247, 180, 174, 0)');

  ctx.fillStyle = C.pink;
  roundRect(ctx, -ctaW / 2, -ctaH / 2, ctaW, ctaH, ctaH / 2); ctx.fill();

  ctx.fillStyle = '#1a1a1a';
  ctx.font = F(14, 700);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(PROMPTS.start, 0, 1);
  ctx.restore();
}

/* ---------- Onboarding legend item ---------- */
function drawLegendItem(x, y, kind, title, desc1, desc2) {
  // Icon box (60x44 on the left)
  const iconW = 60, iconH = 44;
  const ix = x, iy = y - iconH / 2;

  ctx.save();
  ctx.translate(ix + iconW / 2, iy + iconH / 2);

  if (kind === 'article') {
    // Mini good article card
    ctx.fillStyle = C.white;
    roundRect(ctx, -25, -18, 50, 36, 5); ctx.fill();
    // Green ribbon
    ctx.save();
    roundRect(ctx, -25, -18, 50, 12, 5); ctx.clip();
    const rg = ctx.createLinearGradient(-25, 0, 25, 0);
    rg.addColorStop(0, '#16a34a');
    rg.addColorStop(1, '#22c55e');
    ctx.fillStyle = rg;
    ctx.fillRect(-25, -18, 50, 12);
    ctx.restore();
    ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
    ctx.beginPath(); ctx.arc(-18, -12, 2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#cbd5e1';
    ctx.fillRect(-18, -2, 30, 1.5);
    ctx.fillRect(-18, 3, 22, 1.5);
    ctx.fillRect(-18, 8, 26, 1.5);
    ctx.strokeStyle = '#22c55e'; ctx.lineWidth = 1.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(12, -12); ctx.lineTo(16, -9); ctx.lineTo(22, -14); ctx.stroke();
  }
  else if (kind === 'detractor') {
    // Bad card (left)
    ctx.fillStyle = '#f8fafc';
    roundRect(ctx, -25, -14, 16, 28, 3); ctx.fill();
    ctx.fillStyle = '#ef4444';
    roundRect(ctx, -25, -14, 16, 6, 3); ctx.fill();
    ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(-22, 5); ctx.lineTo(-12, 5); ctx.stroke();
    // Knowledge gap hole (center) - dark void, not cloud
    const holeG = ctx.createRadialGradient(0, 0, 0, 0, 0, 13);
    holeG.addColorStop(0, 'rgba(2, 6, 15, 0.9)');
    holeG.addColorStop(0.6, 'rgba(15, 23, 42, 0.7)');
    holeG.addColorStop(1, 'rgba(30, 41, 59, 0)');
    ctx.fillStyle = holeG;
    ctx.beginPath(); ctx.arc(0, 0, 13, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(100, 116, 139, 0.5)'; ctx.lineWidth = 1;
    ctx.setLineDash([3, 4]);
    ctx.beginPath(); ctx.arc(0, 0, 9, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(148, 163, 184, 0.6)';
    ctx.font = F(10, 700); ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('?', 0, 0);
    // Negative feedback bubble (right)
    ctx.fillStyle = '#dc2626';
    roundRect(ctx, 10, -10, 18, 16, 4); ctx.fill();
    ctx.fillStyle = C.white;
    ctx.fillRect(16, -6, 6, 4);
    ctx.beginPath();
    ctx.moveTo(16, -2); ctx.lineTo(22, -2); ctx.lineTo(20, 2); ctx.lineTo(18, 2);
    ctx.closePath(); ctx.fill();
  }
  else if (kind === 'buddy') {
    const halo = ctx.createRadialGradient(0, 0, 5, 0, 0, 28);
    halo.addColorStop(0, 'rgba(247, 180, 174, 0.4)');
    halo.addColorStop(1, 'rgba(247, 180, 174, 0)');
    ctx.fillStyle = halo;
    ctx.beginPath(); ctx.arc(0, 0, 28, 0, Math.PI*2); ctx.fill();
    ctx.save();
    ctx.scale(0.36, 0.36);
    drawTextBuddyMark();
    ctx.restore();
  }
  else if (kind === 'portal') {
    const t = performance.now() / 400;
    ctx.save();
    ctx.rotate(t);
    ctx.strokeStyle = C.pink; ctx.lineWidth = 2;
    ctx.setLineDash([5, 4]);
    ctx.beginPath(); ctx.arc(0, 0, 16, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
    const inner = ctx.createRadialGradient(0, 0, 2, 0, 0, 12);
    inner.addColorStop(0, 'rgba(247, 180, 174, 0.9)');
    inner.addColorStop(0.6, 'rgba(0, 94, 184, 0.85)');
    inner.addColorStop(1, 'rgba(10, 15, 30, 0.7)');
    ctx.fillStyle = inner;
    ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI*2); ctx.fill();
  }
  else if (kind === 'combo') {
    const pillW = 52, pillH = 24;
    const glow = ctx.createRadialGradient(0, 0, 6, 0, 0, 36);
    glow.addColorStop(0, 'rgba(250, 204, 21, 0.35)');
    glow.addColorStop(1, 'rgba(250, 204, 21, 0)');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(0, 0, 36, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#facc15';
    roundRect(ctx, -pillW/2, -pillH/2, pillW, pillH, pillH/2); ctx.fill();
    ctx.fillStyle = '#1a1a1a';
    ctx.font = F(14, 700); ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('x3', 0, 1);
  }

  ctx.restore();

  // Text to the right of icon (title + two description lines)
  const tx = x + iconW + 16;
  ctx.fillStyle = C.white;
  ctx.font = F(13, 700);
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(title, tx, y - 8);

  ctx.fillStyle = 'rgba(255, 255, 255, 0.65)';
  ctx.font = F(11, 400);
  ctx.fillText(desc1, tx, y + 8);
  if (desc2) {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
    ctx.fillText(desc2, tx, y + 24);
  }
}

function drawMiniDetractor(x, y, w, h, item) {
  ctx.fillStyle = 'rgba(255, 255, 255, 0.04)';
  roundRect(ctx, x, y, w, h, 6); ctx.fill();
  ctx.strokeStyle = 'rgba(239, 68, 68, 0.18)';

  roundRect(ctx, x, y, w, h, 6); ctx.stroke();

  const iconSize = 36;
  const iconX = x + 8 + iconSize / 2;

  ctx.save();
  ctx.translate(iconX, iconY);

  if (item.type === 'bad') {
    ctx.fillStyle = '#f8fafc';
    roundRect(ctx, -12, -14, 24, 28, 3); ctx.fill();
    ctx.fillStyle = '#ef4444';
    roundRect(ctx, -12, -14, 24, 6, 3); ctx.fill();
    ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(-9, -3); ctx.lineTo(9, -3);
    ctx.moveTo(-9, 1); ctx.lineTo(7, 1);
    ctx.moveTo(-9, 5); ctx.lineTo(9, 5); ctx.stroke();
    ctx.strokeStyle = '#dc2626'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-9, -10); ctx.lineTo(9, 10); ctx.stroke();
  } else if (item.type === 'gap') {
    const g = ctx.createRadialGradient(0, 0, 0, 0, 0, 16);
    g.addColorStop(0, 'rgba(2, 6, 15, 0.95)');
    g.addColorStop(0.6, 'rgba(15, 23, 42, 0.7)');
    g.addColorStop(1, 'rgba(30, 41, 59, 0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0, 0, 16, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(100, 116, 139, 0.6)'; ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.arc(0, 0, 11, 0, Math.PI * 2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(148, 163, 184, 0.85)';
    ctx.font = F(12, 700); ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('?', 0, 1);
  } else if (item.type === 'retr') {
    ctx.fillStyle = '#f59e0b';
    ctx.beginPath();
    ctx.moveTo(0, -14);
    ctx.lineTo(14, 12);
    ctx.lineTo(-14, 12);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = '#1a1a1a';
    ctx.font = F(14, 700); ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('!', 0, 4);
  } else if (item.type === 'neg') {
    ctx.fillStyle = '#dc2626';
    roundRect(ctx, -14, -10, 28, 18, 5); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-2, 8); ctx.lineTo(0, 13); ctx.lineTo(4, 8);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = C.white;
    ctx.fillRect(-6, -3, 12, 2.5);
  }

  ctx.restore();

  const tx = x + 8 + iconSize + 10;
  ctx.fillStyle = C.white;
  ctx.font = F(11, 700);
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(item.name, tx, y + 19);

  ctx.fillStyle = 'rgba(255, 255, 255, 0.55)';
  ctx.font = F(9, 400);
  ctx.fillText(item.desc, tx, y + 34);
}

/* ---------- Tutorial overlays ---------- */
function drawTutorialOverlay() {
  const cur = TUTORIAL_STEPS[Math.min(tutorial.step, TUTORIAL_STEPS.length - 1)];
  const isDone = tutorial.step >= TUTORIAL_STEPS.length - 1;

  // Top instruction band
  const bandH = 96;
  const bandY = 12;
  const bandX = 60;
  const bandW = W - 120;

  ctx.fillStyle = 'rgba(10, 15, 30, 0.78)';
  roundRect(ctx, bandX, bandY, bandW, bandH, 12); ctx.fill();
  ctx.strokeStyle = 'rgba(247, 180, 174, 0.45)';
  ctx.lineWidth = 1;
  roundRect(ctx, bandX, bandY, bandW, bandH, 12); ctx.stroke();

  // Title (eyebrow)
  ctx.fillStyle = isDone ? '#22c55e' : 'rgba(247, 180, 174, 0.95)';
  ctx.font = F(11, 700);
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(cur.title, bandX + 24, bandY + 26);

  // Lines
  ctx.fillStyle = C.white;
  ctx.font = F(15, 700);
  ctx.fillText(cur.line1, bandX + 24, bandY + 52);
  if (cur.line2) {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
    ctx.font = F(13, 400);
    ctx.fillText(cur.line2, bandX + 24, bandY + 76);
  }

  // Progress indicator (right side of the band) — per-step counter
  let progressText = '';
  if (tutorial.step === 0) progressText = `${tutorial.flaps} / 5 flaps`;
  else if (tutorial.step === 1) progressText = `${tutorial.catches} / 3 caught`;
  else if (tutorial.step === 2) progressText = `${tutorial.avoided} / 4 avoided`;
  else if (tutorial.step === 3) progressText = tutorial.delivered ? 'Delivered!' : 'Find the portal';
  if (progressText) {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
    ctx.font = F(12, 700);
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.fillText(progressText, bandX + bandW - 24, bandY + bandH / 2);
  }

  // Pulse hint at bottom when done
  if (isDone) {
    const pulse = 0.6 + 0.4 * Math.abs(Math.sin(performance.now() / 280));
    ctx.fillStyle = `rgba(34, 197, 94, ${pulse})`;
    ctx.font = F(13, 700);
    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    ctx.fillText(isMobile ? 'TAP TO RETURN' : 'PRESS SPACE TO RETURN', W / 2, H - 60);
  }
}

/* ---------- Arcade name entry screen ---------- */
function drawNameEntry() {
  const cx = W / 2, cy = H / 2;

  // Backdrop
  ctx.fillStyle = 'rgba(10, 15, 30, 0.82)';
  ctx.fillRect(0, 0, W, H);

  // Panel
  const pw = 620, ph = 540;
  const px = cx - pw / 2, py = cy - ph / 2;
  const gr = ctx.createLinearGradient(px, py, px, py + ph);
  gr.addColorStop(0, 'rgba(15, 26, 53, 0.98)');
  gr.addColorStop(1, 'rgba(10, 15, 30, 0.98)');
  ctx.fillStyle = gr;
  roundRect(ctx, px, py, pw, ph, 20); ctx.fill();
  ctx.strokeStyle = 'rgba(63, 143, 217, 0.25)';
  ctx.lineWidth = 1;
  roundRect(ctx, px, py, pw, ph, 20); ctx.stroke();

  // Score display
  ctx.fillStyle = C.pink;
  roundRect(ctx, px + 32, py + 28, 44, 3, 2); ctx.fill();
  ctx.fillStyle = 'rgba(247, 180, 174, 0.85)';
  ctx.font = F(10, 700);
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('YOUR SCORE', px + 32, py + 56);
  ctx.fillStyle = C.white;
  ctx.font = F(36, 700);
  ctx.fillText(`${world.finalEntry.score}`, px + 32, py + 96);

  // "ENTER YOUR NAME" title
  ctx.fillStyle = C.white;
  ctx.font = F(20, 700);
  ctx.textAlign = 'center';
  ctx.fillText('ENTER YOUR NAME', cx, py + 150);

  // Single free-text input box
  const inputW = 380, inputH = 70;
  const inputX = cx - inputW / 2;
  const inputY = cy - 35;
  const slotsY = inputY;
  const slotH = inputH;
  const hasText = nameEntry.text.length > 0;

  ctx.fillStyle = 'rgba(247, 180, 174, 0.10)';
  roundRect(ctx, inputX, inputY, inputW, inputH, 12); ctx.fill();
  ctx.strokeStyle = C.pink;
  ctx.lineWidth = 2;
  roundRect(ctx, inputX, inputY, inputW, inputH, 12); ctx.stroke();

  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  if (hasText) {
    ctx.fillStyle = C.white;
    ctx.font = F(26, 700);
    ctx.fillText(nameEntry.text, inputX + 18, inputY + inputH / 2 + 1);
    const caretBlink = Math.floor(performance.now() / 500) % 2 === 0;
    if (caretBlink) {
      const tw = ctx.measureText(nameEntry.text).width;
      ctx.fillStyle = C.pink;
      ctx.fillRect(inputX + 18 + tw + 3, inputY + 12, 2, inputH - 24);
    }
  } else {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
    ctx.font = F(20, 400);
    ctx.fillText(isMobile ? 'Tap to type your name' : 'Type your name…', inputX + 18, inputY + inputH / 2 + 1);
  }

  ctx.fillStyle = nameEntry.text.length >= NAME_MAX_LEN ? C.pink : 'rgba(255, 255, 255, 0.4)';
  ctx.font = F(10, 700);
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.fillText(`${nameEntry.text.length}/${NAME_MAX_LEN}`, inputX + inputW - 16, inputY + inputH - 12);

  // Country selector
  const countryY = slotsY + slotH + 36;
  const countryW = 220, countryH = 40;
  const countryX = cx - countryW / 2;
  const countrySelected = false;

  ctx.fillStyle = 'rgba(247, 180, 174, 0.85)';
  ctx.font = F(10, 700);
  ctx.textAlign = 'center';
  ctx.fillText('COUNTRY', cx, countryY - 8);

  // Country box
  ctx.fillStyle = countrySelected ? 'rgba(247, 180, 174, 0.15)' : 'rgba(255, 255, 255, 0.06)';
  roundRect(ctx, countryX, countryY, countryW, countryH, 8); ctx.fill();
  ctx.strokeStyle = countrySelected ? C.pink : 'rgba(255, 255, 255, 0.15)';
  ctx.lineWidth = countrySelected ? 2 : 1;
  roundRect(ctx, countryX, countryY, countryW, countryH, 8); ctx.stroke();

  const cc = COUNTRIES[nameEntry.countryIdx];
  ctx.fillStyle = C.white;
  ctx.font = F(16, 700);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(`${cc}  ·  ${COUNTRY_NAMES[cc] || cc}`, cx, countryY + countryH / 2);

  // Arrows
  ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
  ctx.font = F(18, 700);
  ctx.fillText('\u25C0', countryX - 20, countryY + countryH / 2);
  ctx.fillText('\u25B6', countryX + countryW + 20, countryY + countryH / 2);

  // Submit button
  const btnW = 220, btnH = 44;
  const btnX = cx - btnW / 2;
  const btnY = countryY + 60;

  const canSubmit = !nameEntry.submitting && getEnteredName().length > 0;
  if (nameEntry.submitting) {
    ctx.fillStyle = 'rgba(247, 180, 174, 0.5)';
    roundRect(ctx, btnX, btnY, btnW, btnH, btnH / 2); ctx.fill();
    ctx.fillStyle = '#1a1a1a';
    ctx.font = F(13, 700);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('SUBMITTING...', cx, btnY + btnH / 2);
  } else if (canSubmit) {
    ctx.fillStyle = C.pink;
    roundRect(ctx, btnX, btnY, btnW, btnH, btnH / 2); ctx.fill();
    ctx.fillStyle = '#1a1a1a';
    ctx.font = F(13, 700);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('SUBMIT SCORE', cx, btnY + btnH / 2);
  } else {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.06)';
    roundRect(ctx, btnX, btnY, btnW, btnH, btnH / 2); ctx.fill();
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
    ctx.lineWidth = 1;
    roundRect(ctx, btnX, btnY, btnW, btnH, btnH / 2); ctx.stroke();
    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.font = F(13, 700);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('SUBMIT SCORE', cx, btnY + btnH / 2);
  }

  // Skip button (text link below)
  const skipW = 180, skipH = 28;
  const skipX = cx - skipW / 2;
  const skipY = btnY + btnH + 12;
  if (!nameEntry.submitting) {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.06)';
    roundRect(ctx, skipX, skipY, skipW, skipH, skipH / 2); ctx.fill();
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.22)';
    ctx.lineWidth = 1;
    roundRect(ctx, skipX, skipY, skipW, skipH, skipH / 2); ctx.stroke();
    ctx.fillStyle = 'rgba(255, 255, 255, 0.65)';
    ctx.font = F(11, 700);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('SKIP — DON’T SAVE', cx, skipY + skipH / 2 + 1);
  }

  // Controls hint (below skip)
  ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
  ctx.font = F(10, 700);
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  const hint = isMobile
    ? 'TAP THE BOX TO TYPE  ·  ARROWS TO CHANGE COUNTRY'
    : 'TYPE YOUR NAME  ·  ←/→ COUNTRY  ·  ENTER TO SUBMIT  ·  ESC TO SKIP';
  ctx.fillText(hint, cx, skipY + skipH + 16);
}

function drawSessionEnd() {
  const pw = 860, ph = 540;
  const px = (W - pw) / 2, py = (H - ph) / 2;

  ctx.fillStyle = 'rgba(10, 15, 30, 0.72)';
  ctx.fillRect(0, 0, W, H);

  const gr = ctx.createLinearGradient(px, py, px, py + ph);
  gr.addColorStop(0, 'rgba(15, 26, 53, 0.98)');
  gr.addColorStop(1, 'rgba(10, 15, 30, 0.98)');
  ctx.fillStyle = gr;
  roundRect(ctx, px, py, pw, ph, 20); ctx.fill();
  ctx.strokeStyle = 'rgba(63, 143, 217, 0.25)';
  ctx.lineWidth = 1;
  roundRect(ctx, px, py, pw, ph, 20); ctx.stroke();

  ctx.fillStyle = C.pink;
  roundRect(ctx, px + 32, py + 36, 48, 3, 2); ctx.fill();

  ctx.fillStyle = C.white;
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.font = F(28, 700);
  ctx.fillText('SESSION COMPLETE', px + 32, py + 78);

  // Left column - session stats
  const colX = px + 32;
  const colY = py + 116;
  const entry = world.finalEntry;

  ctx.fillStyle = 'rgba(247, 180, 174, 0.85)';
  ctx.font = F(10, 700);
  ctx.fillText('THIS SESSION', colX, colY);

  ctx.fillStyle = C.white;
  ctx.font = F(40, 700);
  ctx.fillText(`${entry.score}`, colX, colY + 48);
  ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
  ctx.font = F(11, 400);
  ctx.fillText('FINAL SCORE', colX, colY + 66);

  const statY = colY + 100;
  const drawStat = (label, value, y) => {
    ctx.fillStyle = 'rgba(247, 180, 174, 0.7)';
    ctx.font = F(10, 700);
    ctx.textAlign = 'left';
    ctx.fillText(label, colX, y);
    ctx.fillStyle = C.white;
    ctx.font = F(20, 700);
    ctx.fillText(value, colX, y + 24);
  };
  drawStat('QUESTIONS', `${entry.questions}`, statY);
  drawStat('AVG QUALITY', `${entry.avg_quality}%`, statY + 52);
  drawStat('MAX COMBO', `${entry.max_combo}`, statY + 104);

  // Right column - GLOBAL LEADERBOARD
  const boardX = px + pw - 380;
  ctx.fillStyle = 'rgba(247, 180, 174, 0.85)';
  ctx.font = F(10, 700);
  ctx.textAlign = 'left';
  ctx.fillText(SUPABASE_CONFIGURED ? 'GLOBAL LEADERBOARD' : 'LOCAL LEADERBOARD', boardX, colY);

  const board = world.topBoard || [];
  if (board.length === 0) {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
    ctx.font = F(13, 400);
    ctx.fillText('No scores yet', boardX, colY + 40);
  } else {
    // Table header
    ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
    ctx.font = F(9, 700);
    ctx.textAlign = 'left';
    ctx.fillText('RANK', boardX, colY + 24);
    ctx.fillText('NAME', boardX + 42, colY + 24);
    ctx.fillText('SCORE', boardX + 140, colY + 24);
    ctx.textAlign = 'right';
    ctx.fillText('COUNTRY', boardX + 350, colY + 24);

    const rowY = colY + 40;
    const rowGap = 30;
    for (let i = 0; i < Math.min(10, board.length); i++) {
      const e = board[i];
      const isCurrent = (i === world.finalRank);
      const y = rowY + i * rowGap;

      if (isCurrent) {
        ctx.fillStyle = 'rgba(247, 180, 174, 0.12)';
        roundRect(ctx, boardX - 6, y - 10, 362, 28, 6); ctx.fill();
      }

      // Rank
      ctx.textAlign = 'left';
      ctx.fillStyle = isCurrent ? C.pink : 'rgba(255, 255, 255, 0.5)';
      ctx.font = F(12, 700);
      ctx.fillText(`#${i + 1}`, boardX, y + 6);

      // Name
      ctx.fillStyle = isCurrent ? C.white : 'rgba(255, 255, 255, 0.85)';
      ctx.font = F(15, 700);
      ctx.fillText(truncateName(e.name, 12), boardX + 42, y + 6);

      // Score
      ctx.fillStyle = isCurrent ? C.white : 'rgba(255, 255, 255, 0.9)';
      ctx.font = F(16, 700);
      ctx.fillText(`${e.score}`, boardX + 140, y + 6);

      // Details
      ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
      ctx.font = F(9, 400);
      ctx.fillText(`${e.questions || 0}Q  ${e.avg_quality || 0}%`, boardX + 140, y + 18);

      // Country
      ctx.fillStyle = 'rgba(255, 255, 255, 0.55)';
      ctx.font = F(12, 700);
      ctx.textAlign = 'right';
      ctx.fillText(e.country || '--', boardX + 350, y + 6);
    }
  }

  // CTA
  const ctaW = 280, ctaH = 38;
  const ctaX = (W - ctaW) / 2;
  const ctaY = py + ph - ctaH - 24;
  ctx.fillStyle = C.pink;
  roundRect(ctx, ctaX, ctaY, ctaW, ctaH, ctaH / 2); ctx.fill();
  ctx.fillStyle = '#1a1a1a';
  ctx.font = F(13, 700);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(PROMPTS.restart, W / 2, ctaY + ctaH / 2 + 1);

  // Rank badge
  if (world.finalRank >= 0 && world.finalRank < 10) {
    const bx = px + pw - 90, by2 = py + 50;
    ctx.fillStyle = C.pink;
    roundRect(ctx, bx, by2, 70, 26, 13); ctx.fill();
    ctx.fillStyle = '#1a1a1a';
    ctx.font = F(11, 700);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(`TOP ${world.finalRank + 1}`, bx + 35, by2 + 14);
  }
}

/* ---------- Full leaderboard view (from boot) ---------- */
function drawLeaderboard() {
  const pw = 760, ph = 580;
  const px = (W - pw) / 2, py = (H - ph) / 2;

  ctx.fillStyle = 'rgba(10, 15, 30, 0.82)';
  ctx.fillRect(0, 0, W, H);

  const gr = ctx.createLinearGradient(px, py, px, py + ph);
  gr.addColorStop(0, 'rgba(15, 26, 53, 0.98)');
  gr.addColorStop(1, 'rgba(10, 15, 30, 0.98)');
  ctx.fillStyle = gr;
  roundRect(ctx, px, py, pw, ph, 20); ctx.fill();
  ctx.strokeStyle = 'rgba(63, 143, 217, 0.25)';
  ctx.lineWidth = 1;
  roundRect(ctx, px, py, pw, ph, 20); ctx.stroke();

  // Header
  ctx.fillStyle = C.pink;
  roundRect(ctx, px + 32, py + 36, 48, 3, 2); ctx.fill();
  ctx.fillStyle = C.white;
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.font = F(28, 700);
  ctx.fillText(SUPABASE_CONFIGURED ? 'GLOBAL LEADERBOARD' : 'LOCAL LEADERBOARD', px + 32, py + 78);
  ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
  ctx.font = F(12, 400);
  ctx.fillText('Top 10 across all Danoners', px + 32, py + 100);

  const tableX = px + 40;
  const tableY = py + 140;
  const board = world.topBoard || [];

  if (board.length === 0) {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
    ctx.font = F(15, 400);
    ctx.textAlign = 'center';
    ctx.fillText('No scores yet — be the first!', W / 2, py + ph / 2);
  } else {
    // Column headers
    ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
    ctx.font = F(9, 700);
    ctx.textAlign = 'left';
    ctx.fillText('RANK', tableX, tableY);
    ctx.fillText('NAME', tableX + 60, tableY);
    ctx.fillText('SCORE', tableX + 200, tableY);
    ctx.fillText('Q', tableX + 330, tableY);
    ctx.fillText('AVG', tableX + 390, tableY);
    ctx.fillText('MAX COMBO', tableX + 460, tableY);
    ctx.textAlign = 'right';
    ctx.fillText('COUNTRY', tableX + pw - 80, tableY);

    const rowH = 34;
    for (let i = 0; i < Math.min(10, board.length); i++) {
      const e = board[i];
      const y = tableY + 22 + i * rowH;

      // Subtle row stripe for top 3
      if (i < 3) {
        ctx.fillStyle = i === 0 ? 'rgba(247, 180, 174, 0.08)' : 'rgba(255, 255, 255, 0.025)';
        roundRect(ctx, tableX - 12, y - 14, pw - 56, 28, 6); ctx.fill();
      }

      ctx.textAlign = 'left';
      ctx.fillStyle = i === 0 ? C.pink : (i < 3 ? 'rgba(255, 255, 255, 0.75)' : 'rgba(255, 255, 255, 0.5)');
      ctx.font = F(13, 700);
      ctx.fillText(`#${i + 1}`, tableX, y);

      ctx.fillStyle = 'rgba(255, 255, 255, 0.92)';
      ctx.font = F(15, 700);
      ctx.fillText(truncateName(e.name, 12), tableX + 60, y);

      ctx.fillStyle = C.white;
      ctx.font = F(16, 700);
      ctx.fillText(`${e.score}`, tableX + 200, y);

      ctx.fillStyle = 'rgba(255, 255, 255, 0.65)';
      ctx.font = F(13, 400);
      ctx.fillText(`${e.questions || 0}`, tableX + 330, y);
      ctx.fillText(`${e.avg_quality || 0}%`, tableX + 390, y);
      ctx.fillText(`${e.max_combo || 0}`, tableX + 460, y);

      ctx.fillStyle = 'rgba(255, 255, 255, 0.55)';
      ctx.font = F(13, 700);
      ctx.textAlign = 'right';
      ctx.fillText(e.country || '--', tableX + pw - 80, y);
    }
  }

  // BACK button
  const btnW = 200, btnH = 40;
  const btnX = (W - btnW) / 2;
  const btnY = py + ph - btnH - 24;
  LEADERBOARD_BACK_BTN.x = btnX;
  LEADERBOARD_BACK_BTN.y = btnY;
  LEADERBOARD_BACK_BTN.w = btnW;
  LEADERBOARD_BACK_BTN.h = btnH;
  ctx.fillStyle = C.pink;
  roundRect(ctx, btnX, btnY, btnW, btnH, btnH / 2); ctx.fill();
  ctx.fillStyle = '#1a1a1a';
  ctx.font = F(13, 700);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(isMobile ? 'TAP TO GO BACK' : 'BACK', btnX + btnW / 2, btnY + btnH / 2 + 1);
}

function drawCenterPanel(title, lines, cta) {
  const pw = 720, ph = 420;
  const px = (W - pw) / 2, py = (H - ph) / 2;

  // Backdrop dimmer
  ctx.fillStyle = 'rgba(10, 15, 30, 0.7)';
  ctx.fillRect(0, 0, W, H);

  // Panel with subtle gradient background
  const gr = ctx.createLinearGradient(px, py, px, py + ph);
  gr.addColorStop(0, 'rgba(15, 26, 53, 0.98)');
  gr.addColorStop(1, 'rgba(10, 15, 30, 0.98)');
  ctx.fillStyle = gr;
  roundRect(ctx, px, py, pw, ph, 20); ctx.fill();
  // Thin hairline border
  ctx.strokeStyle = 'rgba(63, 143, 217, 0.25)';
  ctx.lineWidth = 1;
  roundRect(ctx, px, py, pw, ph, 20); ctx.stroke();

  // Top pink accent bar
  ctx.fillStyle = C.pink;
  roundRect(ctx, px + 32, py + 36, 48, 3, 2); ctx.fill();

  // Title
  ctx.fillStyle = C.white;
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.font = F(30, 800);
  ctx.fillText(title, px + 32, py + 80);

  // Body lines
  ctx.font = F(15, 500);
  ctx.fillStyle = 'rgba(255, 255, 255, 0.72)';
  let ly = py + 120;
  for (const line of lines) {
    ctx.fillText(line, px + 32, ly);
    ly += 26;
  }

  // CTA pill at bottom
  const ctaW = 280, ctaH = 38;
  const ctaX = (W - ctaW) / 2;
  const ctaY = py + ph - ctaH - 28;
  ctx.fillStyle = C.pink;
  roundRect(ctx, ctaX, ctaY, ctaW, ctaH, ctaH / 2); ctx.fill();
  ctx.fillStyle = '#1a1a1a';
  ctx.font = F(13, 800);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(cta.toUpperCase(), W / 2, ctaY + ctaH / 2 + 1);
}

/* ---------- Utility ---------- */
function roundRect(ctx, x, y, w, h, r) {
  if (w < 2 * r) r = w / 2;
  if (h < 2 * r) r = h / 2;
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

/* ---------- Main loop ---------- */
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

/* ---------- Boot ---------- */
world.question = QUESTIONS[0];
loadLeaderboardForBoot();
detectAndSetUserCountry();
loop();
</script>
