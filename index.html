  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0f1e;
    font-family: 'DanoneOne', 'DanoneOne Web', 'Manrope', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
    color: #fff;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
  #gameWrap {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  canvas {
    display: block;
    background: linear-gradient(180deg, #0a0f1e 0%, #0f1a35 60%, #1a2550 100%);
    /* Fill the entire game wrapper. The actual 16:9 game bitmap is letterboxed
       inside via object-fit: contain — so on tall screens (tablets, narrow
       windows, some Androids in landscape) the dark gradient extends edge-to-edge
       instead of leaving bare body background visible. */
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 0;
    box-shadow: none;
  }
  #rotateOverlay {
    display: none;
    position: fixed; inset: 0; z-index: 9999;
    background: #0a0f1e;
    align-items: center; justify-content: center;
    flex-direction: column;
  }
  .rotate-content {
    text-align: center;
    animation: rotateFloat 2s ease-in-out infinite;
  }
  .rotate-content p {
    margin-top: 16px;
    font-size: 16px; font-weight: 700;
    color: #F7B4AE;
    letter-spacing: 0.04em;
  }
  .rotate-content .sub {
    margin-top: 8px;
    font-size: 12px; font-weight: 400;
    color: rgba(255,255,255,0.5);
  }
  @keyframes rotateFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  @media (max-width: 900px) and (orientation: portrait) {
    #rotateOverlay { display: flex; }
    #gameWrap { display: none; }
  }

  /* ---------- Mobile name-entry overlay ---------- */
  #mobileNameEntry {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 1000;
    background: rgba(10, 15, 30, 0.95);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: max(12px, env(safe-area-inset-top)) 16px max(12px, env(safe-area-inset-bottom));
    box-sizing: border-box;
    /* Re-enable native input behavior even though body has touch-action: none */
    touch-action: manipulation;
    -webkit-user-select: auto;
    user-select: auto;
  }
  #mobileNameEntry.active { display: block; }
  .mne-panel {
    width: 100%;
    max-width: 460px;
    margin: 0 auto;
    background: linear-gradient(180deg, rgba(15, 26, 53, 0.98), rgba(10, 15, 30, 0.98));
    border: 1px solid rgba(63, 143, 217, 0.25);
    border-radius: 16px;
    padding: 18px 18px 16px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    /* spacer below content so keyboard doesn't hide the buttons; user can scroll up to controls */
    margin-bottom: 280px;
  }
  .mne-accent {
    width: 40px; height: 3px;
    background: #F7B4AE;
    border-radius: 2px;
    margin-bottom: 10px;
  }
  .mne-eyebrow {
    color: rgba(247, 180, 174, 0.85);
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.10em;
    margin-bottom: 4px;
  }
  .mne-eyebrow-center {
    text-align: center;
    margin-top: 14px;
  }
  .mne-score {
    color: #fff;
    font-size: 38px; font-weight: 700;
    line-height: 1.05;
    margin-bottom: 6px;
  }
  .mne-title {
    color: #fff;
    font-size: 18px; font-weight: 700;
    text-align: center;
    margin: 8px 0 12px;
    letter-spacing: 0.04em;
  }
  #mneInput {
    width: 100%;
    box-sizing: border-box;
    background: rgba(247, 180, 174, 0.10);
    border: 2px solid #F7B4AE;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 22px; font-weight: 700;
    color: #fff;
    font-family: inherit;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
    caret-color: #F7B4AE;
    /* Ensure the field is freely tappable + selectable on every Android stock browser */
    touch-action: manipulation;
    -webkit-user-select: text;
    user-select: text;
    pointer-events: auto;
  }
  #mneInput:focus {
    background: rgba(247, 180, 174, 0.18);
  }
  #mneInput::placeholder {
    color: rgba(255, 255, 255, 0.35);
    font-weight: 400;
  }
  .mne-counter {
    text-align: right;
    color: rgba(255, 255, 255, 0.4);
    font-size: 10px; font-weight: 700;
    margin-top: 4px;
    margin-bottom: 8px;
  }
  #mneCountry {
    width: 100%;
    box-sizing: border-box;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.18);
    color: #fff;
    border-radius: 10px;
    padding: 12px 36px 12px 14px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 14px;
    -webkit-appearance: none;
    appearance: none;
    outline: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='none' stroke='%23F7B4AE' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round' d='M1 1.5l5 5 5-5'/></svg>");
    background-repeat: no-repeat;
    background-position: right 12px center;
  }
  #mneCountry option { color: #1a1a1a; background: #fff; }
  .mne-btn-primary {
    width: 100%;
    background: #F7B4AE;
    color: #1a1a1a;
    border: 0;
    border-radius: 999px;
    padding: 14px;
    font-family: inherit;
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .mne-btn-primary:disabled {
    background: rgba(255, 255, 255, 0.06);
    color: rgba(255, 255, 255, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.15);
  }
  .mne-btn-skip {
    width: 100%;
    background: rgba(255, 255, 255, 0.06);
    color: rgba(255, 255, 255, 0.7);
    border: 1px solid rgba(255, 255, 255, 0.22);
    border-radius: 999px;
    padding: 10px;
    font-family: inherit;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    margin-top: 10px;
    -webkit-tap-highlight-color: transparent;
  }
</style>
</head>

</div>

  if (!SUPABASE_CONFIGURED) return null;
  try {

      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Prefer': 'return=representation'
      },
      body: JSON.stringify(entry)
    });
    if (!res.ok) throw new Error(res.statusText);
    return await res.json();
  } catch (e) { console.error('Supabase submit error:', e); return null; }
}

async function supabaseFetchTop(limit = 10) {
  if (!SUPABASE_CONFIGURED) return [];
  try {

      `${SUPABASE_URL}/rest/v1/scores?select=*&order=score.desc&limit=${limit}`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );

/* ---------- TextBuddy icon drawn in canvas (no raster dependency) ---------- */
// Renders the TextBuddy mark centered at (0,0) in ~100px logical space.
// Scales perfectly at any size via caller's ctx.scale().
function drawTextBuddyMark() {
  // Antenna (line + dot)
  ctx.strokeStyle = C.blue;
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(0, -24);
  ctx.lineTo(0, -35);
  ctx.stroke();
  ctx.fillStyle = C.blue;
  ctx.beginPath(); ctx.arc(0, -38, 5.5, 0, Math.PI*2); ctx.fill();

  // Left and right side ears
  ctx.fillStyle = C.blue;
  roundRect(ctx, -32, -3, 6, 14, 3); ctx.fill();
  roundRect(ctx, 26, -3, 6, 14, 3); ctx.fill();

  // Bottom-left tail (teardrop)
  ctx.fillStyle = C.blue;
  ctx.beginPath();
  ctx.moveTo(-4, 24);
  ctx.bezierCurveTo(-14, 30, -20, 36, -18, 40);
  ctx.bezierCurveTo(-16, 44, -8, 40, -2, 32);
  ctx.closePath();
  ctx.fill();

  // Main head body (rounded square)
  ctx.fillStyle = C.blue;
  roundRect(ctx, -26, -24, 52, 48, 11); ctx.fill();

  // Dark face interior
  ctx.fillStyle = '#1a2335';
  roundRect(ctx, -20, -18, 40, 36, 8); ctx.fill();

  // White mouth/eye slit
  ctx.fillStyle = C.white;
  roundRect(ctx, -14, -4, 28, 11, 4); ctx.fill();

  // Speech bubble (upper-right)
  ctx.fillStyle = C.pink;
  roundRect(ctx, 10, -40, 38, 22, 5); ctx.fill();
  // Bubble tail
  ctx.beginPath();
  ctx.moveTo(16, -21);
  ctx.lineTo(12, -13);
  ctx.lineTo(22, -19);
  ctx.closePath();
  ctx.fill();

  // Dark dash inside bubble
  ctx.fillStyle = '#1a2335';
  roundRect(ctx, 22, -32, 14, 5, 1); ctx.fill();
}

/* Reset button hitbox (rendered at bottom-right of canvas) */
const RESET_BTN = { x: W - 44, y: H - 78, r: 16 };

const BOOT_TUTORIAL_BTN = { x: 0, y: 0, w: 0, h: 0 };

const LEADERBOARD_BACK_BTN = { x: 0, y: 0, w: 0, h: 0 };
/* Tutorial "SKIP" button hitbox (set in drawTutorialSkipBtn) */
const TUTORIAL_SKIP_BTN = { x: 0, y: 0, w: 0, h: 0 };

function hitBootLeaderboardBtn(mx, my) {

function hitBootTutorialBtn(mx, my) {

function hitResetButton(mx, my) {
  if (state === STATE.BOOT) return false;
  const dx = mx - RESET_BTN.x, dy = my - RESET_BTN.y;
  return dx * dx + dy * dy < RESET_BTN.r * RESET_BTN.r;
}

function canvasCoords(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = W / rect.width;
  const sy = H / rect.height;
  const cx = (e.clientX !== undefined ? e.clientX : e.touches[0].clientX);
  const cy = (e.clientY !== undefined ? e.clientY : e.touches[0].clientY);
  return { x: (cx - rect.left) * sx, y: (cy - rect.top) * sy };
}

  if (state === STATE.LEADERBOARD) {

/* ---------- Mobile fullscreen + landscape lock ---------- */
let didFullscreen = false;
function goFullscreenOnce() {
  if (didFullscreen) return;
  didFullscreen = true;
  const el = document.documentElement;
  const rfs = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
  if (rfs) {
    rfs.call(el).then(() => {
      // Try to lock orientation to landscape
      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock('landscape').catch(() => {});
      }
    }).catch(() => {});
  }
}

/* ---------- Audio (Web Audio simple beeps) ---------- */
let audioCtx = null;
function beep(freq, dur, type = 'sine', vol = 0.12) {
  if (input.mute) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch (e) {}
}
const sfx = {

  bad:     () => beep(140, 0.20, 'sawtooth', 0.12),
  gap:     () => beep(90,  0.35, 'sine', 0.10),
  retr:    () => beep(220, 0.25, 'square', 0.10),
  win:     () => { beep(523, 0.10); setTimeout(()=>beep(659,0.10),110); setTimeout(()=>beep(784,0.18),220); },

/* ---------- Background (clean minimal grid + glow) ---------- */
const bg = {
  gridOffset: 0,
  particles: Array.from({ length: 40 }, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    s: 0.4 + Math.random() * 1.8,
    v: 0.3 + Math.random() * 1.2,
    a: 0.15 + Math.random() * 0.35
  }))
};
function drawBackground() {
  // Soft left-side glow
  const grad = ctx.createRadialGradient(W*0.25, H*0.5, 100, W*0.25, H*0.5, W*0.8);
  grad.addColorStop(0, 'rgba(0, 94, 184, 0.18)');
  grad.addColorStop(1, 'rgba(0, 94, 184, 0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Subtle parallax grid
  bg.gridOffset = (bg.gridOffset + 0.5) % 80;
  ctx.strokeStyle = C.grid; ctx.lineWidth = 1;
  for (let x = -bg.gridOffset; x < W; x += 80) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 80) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Drifting particles
  for (const p of bg.particles) {
    p.x -= p.v;
    if (p.x < -4) { p.x = W + 4; p.y = Math.random() * H; }
    ctx.fillStyle = `rgba(63, 143, 217, ${p.a})`;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
  }

  // Knowledge gap fog at the bottom
  if (state !== STATE.BOOT) {
    drawKnowledgeGapFog();
  }
}

/* ---------- Knowledge gap fog (bottom of the stage is the abyss) ---------- */
function drawKnowledgeGapFog() {
  const fogH = 110;
  const fogY = H - fogH;

  // Main fog gradient (stronger opacity)
  const fog = ctx.createLinearGradient(0, fogY - 10, 0, H);
  fog.addColorStop(0, 'rgba(51, 65, 85, 0)');
  fog.addColorStop(0.2, 'rgba(51, 65, 85, 0.12)');
  fog.addColorStop(0.45, 'rgba(30, 41, 59, 0.35)');
  fog.addColorStop(0.7, 'rgba(15, 23, 42, 0.6)');
  fog.addColorStop(1.0, 'rgba(10, 15, 30, 0.85)');
  ctx.fillStyle = fog;
  ctx.fillRect(0, fogY - 10, W, fogH + 10);

  // Animated wispy layers
  const t = performance.now() / 1000;
  for (let i = 0; i < 6; i++) {
    const wispY = H - 50 - i * 10;
    const phase = t * 0.25 + i * 1.4;
    const a = 0.06 + i * 0.035;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.fillStyle = i % 2 === 0 ? '#475569' : '#64748b';
    ctx.beginPath();
    ctx.moveTo(0, wispY);
    for (let x = 0; x <= W; x += 16) {
      const yOff = Math.sin(x * 0.005 + phase) * 7 + Math.sin(x * 0.013 + phase * 1.6) * 4;
      ctx.lineTo(x, wispY + yOff);
    }
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // Question mark particles floating in the fog
  ctx.font = F(16, 700);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (let i = 0; i < 8; i++) {
    const qx = ((t * 15 + i * 163) % (W + 80)) - 40;
    const qy = H - 30 - Math.sin(t * 0.7 + i * 1.8) * 10;
    const qa = 0.15 + Math.sin(t * 0.9 + i) * 0.07;
    ctx.fillStyle = `rgba(148, 163, 184, ${qa})`;
    ctx.fillText('?', qx, qy);
  }
}

/* ---------- DANY AI character ---------- */
class DanyAI {
  constructor() { this.reset(); }
  reset() {
    this.x = 220; this.y = H / 2;
    this.vy = 0; this.size = 96;
    this.rot = 0; this.flapAnim = 0;
    this.stunned = 0; this.invul = 0;
    this.flapCooldown = 0;
    this.trail = [];
  }
  flap() {
    if (this.stunned > 0) return;
    if (this.flapCooldown > 0) return;
    this.vy = -7.6;
    this.flapAnim = 1;
    this.flapCooldown = 4;
    sfx.flap();
  }
  update() {
    // Physics
    const gravity = DEBUG.noGravity ? 0 : (this.stunned > 0 ? 0.55 : 0.42);
    this.vy += gravity;
    if (DEBUG.noGravity) this.vy *= 0.9; // damping for free flight
    if (this.vy > 11) this.vy = 11;
    this.y += this.vy;
    this.rot = Math.max(-0.45, Math.min(0.9, this.vy * 0.08));
    this.flapAnim *= 0.88;
    if (this.stunned > 0) this.stunned--;
    if (DEBUG.god) this.invul = Math.max(this.invul, 2);
    else if (this.invul > 0) this.invul--;
    if (this.flapCooldown > 0) this.flapCooldown--;

    // Trail
    this.trail.unshift({ x: this.x, y: this.y });
    if (this.trail.length > 10) this.trail.pop();

    // Bounds
    if (this.y < 30) { this.y = 30; this.vy = 0; }
    if (this.y > H - 30) {
      this.y = H - 30;
      if (!DEBUG.god) gameOver('Dany AI fell into the knowledge gap :(');
      else this.vy = 0;
    }
  }
  hitbox() {
    return { x: this.x - 28, y: this.y - 28, w: 56, h: 56 };
  }
  draw() {
    // Pink spotlight halo behind DANY (makes him pop against blue bg)
    const pulseScale = 1 + Math.sin(performance.now() / 400) * 0.04;
    const haloR = 75 * pulseScale;
    const halo = ctx.createRadialGradient(this.x, this.y, 20, this.x, this.y, haloR);
    halo.addColorStop(0,   'rgba(247, 180, 174, 0.55)');
    halo.addColorStop(0.4, 'rgba(247, 180, 174, 0.22)');
    halo.addColorStop(1,   'rgba(247, 180, 174, 0)');
    ctx.fillStyle = halo;
    ctx.beginPath(); ctx.arc(this.x, this.y, haloR, 0, Math.PI*2); ctx.fill();

    // TextBuddy shield ring when active
    if (world.shield > 0) {
      const shieldPulse = Math.sin(performance.now() / 120) * 0.15 + 1;
      const shieldR = 70 * shieldPulse;
      // Fade out in last 60 frames
      const shieldAlpha = Math.min(1, world.shield / 60);
      ctx.strokeStyle = `rgba(247, 180, 174, ${0.85 * shieldAlpha})`;
      ctx.lineWidth = 3;
      ctx.setLineDash([8, 6]);
      ctx.lineDashOffset = -performance.now() / 30;
      ctx.beginPath();
      ctx.arc(this.x, this.y, shieldR, 0, Math.PI*2);
      ctx.stroke();
      ctx.setLineDash([]);
      // Secondary inner ring
      ctx.strokeStyle = `rgba(255, 255, 255, ${0.5 * shieldAlpha})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(this.x, this.y, shieldR - 6, 0, Math.PI*2);
      ctx.stroke();
    }

    // Secondary bright white core glow for extra contrast
    const core = ctx.createRadialGradient(this.x, this.y, 5, this.x, this.y, 40);
    core.addColorStop(0,   'rgba(255, 255, 255, 0.35)');
    core.addColorStop(0.5, 'rgba(255, 255, 255, 0.10)');
    core.addColorStop(1,   'rgba(255, 255, 255, 0)');
    ctx.fillStyle = core;
    ctx.beginPath(); ctx.arc(this.x, this.y, 40, 0, Math.PI*2); ctx.fill();

    // Trail (pink flaps)
    for (let i = this.trail.length - 1; i >= 0; i--) {
      const t = this.trail[i];
      const a = (1 - i / this.trail.length) * 0.45;
      ctx.fillStyle = `rgba(247, 180, 174, ${a})`;
      ctx.beginPath(); ctx.arc(t.x - 22, t.y, 7 - i * 0.4, 0, Math.PI*2); ctx.fill();
    }

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);

    // Flicker if stunned or invulnerable
    const flicker = this.stunned > 0 && Math.floor(this.stunned / 3) % 2 === 0;
    const invulFlicker = this.invul > 0 && Math.floor(this.invul / 4) % 2 === 0;
    if (flicker || invulFlicker) { ctx.globalAlpha = 0.5; }

    // Strong pink shadow for edge separation (overrides soft blue glow)
    ctx.shadowColor = 'rgba(247, 180, 174, 0.95)';
    ctx.shadowBlur = 18;

    // Subtle bounce on flap
    const bounce = 1 + this.flapAnim * 0.08;
    const s = this.size * bounce;

    // Real DANY SVG
    if (danyImgReady) {
      ctx.drawImage(danyImg, -s/2, -s/2, s, s);
    } else {
      // Fallback circle while image loads
      ctx.fillStyle = C.blue;
      ctx.beginPath(); ctx.arc(0, 0, s/3, 0, Math.PI*2); ctx.fill();
    }

    ctx.shadowBlur = 0;

    // Pink cheeks pulse when flapping
    if (this.flapAnim > 0.15) {
      ctx.fillStyle = `rgba(247, 180, 174, ${this.flapAnim * 0.8})`;
      ctx.beginPath(); ctx.arc(-s*0.32, s*0.05, 4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc( s*0.32, s*0.05, 4, 0, Math.PI*2); ctx.fill();
    }

    ctx.restore();
  }
}

/* ---------- Articles (good) - minimal modern KB card ---------- */
class GoodArticle {
  constructor(x, y, title) {
    this.x = x; this.y = y; this.title = title;
    this.w = 180; this.h = 110;
    this.collected = false;
    this.bob = Math.random() * Math.PI * 2;
    this.pulse = 0;
  }
  update(speed) {
    this.x -= speed;
    this.bob += 0.04;
    this.pulse = (this.pulse + 0.05) % (Math.PI * 2);
    if (this.justConverted > 0) this.justConverted--;
  }
  hitbox() {
    return { x: this.x - this.w/2 + 8, y: this.y - this.h/2 + 8, w: this.w - 16, h: this.h - 16 };
  }
  draw() {
    const y = this.y + Math.sin(this.bob) * 3;
    ctx.save();
    ctx.translate(this.x, y);

    // Soft green ambient halo
    const glowR = 100 + Math.sin(this.pulse) * 3;
    const halo = ctx.createRadialGradient(0, 0, 30, 0, 0, glowR);
    // Pink-tinted halo when just converted, fades to green
    const conv = this.justConverted > 0 ? this.justConverted / 30 : 0;
    const haloColorStart = conv > 0
      ? `rgba(247, 180, 174, ${0.18 + conv * 0.3})`
      : 'rgba(34, 197, 94, 0.18)';
    halo.addColorStop(0, haloColorStart);
    halo.addColorStop(1, 'rgba(34, 197, 94, 0)');
    ctx.fillStyle = halo;
    ctx.beginPath(); ctx.arc(0, 0, glowR, 0, Math.PI*2); ctx.fill();

    // Extra sparkles when just converted
    if (this.justConverted > 0) {
      const c = this.justConverted / 30;
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2 + this.pulse;
        const r = 80 + Math.sin(this.pulse + i) * 6;
        const sx = Math.cos(a) * r;
        const sy = Math.sin(a) * r;
        ctx.fillStyle = `rgba(247, 180, 174, ${c * 0.9})`;
        ctx.beginPath(); ctx.arc(sx, sy, 2.5, 0, Math.PI*2); ctx.fill();
      }
    }

    // Subtle drop shadow (soft, small offset)
    ctx.fillStyle = 'rgba(0, 0, 0, 0.22)';
    roundRect(ctx, -this.w/2 + 1, -this.h/2 + 3, this.w, this.h, 14); ctx.fill();

    // Card body (white)
    ctx.fillStyle = C.white;
    roundRect(ctx, -this.w/2, -this.h/2, this.w, this.h, 14); ctx.fill();

    // Green ribbon on top (clipped to rounded card)
    const ribbonH = 34;
    ctx.save();
    roundRect(ctx, -this.w/2, -this.h/2, this.w, ribbonH, 14);
    ctx.clip();
    const rg = ctx.createLinearGradient(-this.w/2, 0, this.w/2, 0);
    rg.addColorStop(0, '#16a34a');
    rg.addColorStop(1, '#22c55e');
    ctx.fillStyle = rg;
    ctx.fillRect(-this.w/2, -this.h/2, this.w, ribbonH);
    ctx.restore();

    // Ribbon content: small white dot + ARTICLE label
    const dotX = -this.w/2 + 16;
    const dotY = -this.h/2 + ribbonH/2;
    ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
    ctx.beginPath(); ctx.arc(dotX, dotY, 4, 0, Math.PI*2); ctx.fill();

    ctx.fillStyle = C.white;
    ctx.font = F(10, 800);
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText('ARTICLE', dotX + 11, dotY + 0.5);

    // Subtle check icon on ribbon right
    const ckX = this.w/2 - 20, ckY = -this.h/2 + ribbonH/2;
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.95)';
    ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(ckX - 5, ckY); ctx.lineTo(ckX - 1, ckY + 4); ctx.lineTo(ckX + 6, ckY - 4);
    ctx.stroke();

    // Title (bold, dark, generous whitespace)
    ctx.fillStyle = '#0f172a';
    ctx.font = F(14, 700);
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    const titleX = -this.w/2 + 16;
    const titleY = -this.h/2 + ribbonH + 14;
    const titleLines = wrapText(this.title, this.w - 32, 14, 700);
    for (let i = 0; i < Math.min(2, titleLines.length); i++) {
      const line = (i === 1 && titleLines.length > 2)
        ? titleLines[i].slice(0, Math.max(0, titleLines[i].length - 3)) + '...'
        : titleLines[i];
      ctx.fillText(line, titleX, titleY + i * 18);
    }

    // Bottom meta label
    ctx.fillStyle = '#94a3b8';
    ctx.font = F(9, 600);
    ctx.textAlign = 'left';
    ctx.textBaseline = 'bottom';
    ctx.fillText('FOUNDA KNOWLEDGE BASE', -this.w/2 + 16, this.h/2 - 12);

    ctx.restore();
  }
}

// Helper: word-wrap text to a max width
function wrapText(text, maxWidth, fontSize, weight = 700) {
  ctx.save();
  ctx.font = F(fontSize, weight);
  const words = text.split(' ');
  const lines = [];
  let cur = '';
  for (const w of words) {
    const test = cur ? cur + ' ' + w : w;
    if (ctx.measureText(test).width > maxWidth && cur) { lines.push(cur); cur = w; }
    else { cur = test; }
  }
  if (cur) lines.push(cur);
  ctx.restore();
  return lines;
}

    const titleX = -this.w/2 + 16;

/* ---------- Knowledge gaps (cloudy void) ---------- */
class KnowledgeGap {
  constructor(x, y) {
    this.x = x; this.y = y; this.r = 44 + Math.random() * 20;
    this.t = Math.random() * Math.PI * 2;
    this.hit = false;
  }
  update(speed) { this.x -= speed; this.t += 0.025; }
  hitbox() { return { x: this.x - this.r*0.65, y: this.y - this.r*0.65, w: this.r*1.3, h: this.r*1.3 }; }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);

    // Outer distortion ring (dark warped edge)
    const edgeR = this.r * 1.15;
    const edge = ctx.createRadialGradient(0, 0, this.r * 0.5, 0, 0, edgeR);
    edge.addColorStop(0, 'rgba(15, 23, 42, 0)');
    edge.addColorStop(0.6, 'rgba(30, 41, 59, 0.25)');
    edge.addColorStop(0.85, 'rgba(51, 65, 85, 0.5)');
    edge.addColorStop(1, 'rgba(51, 65, 85, 0)');
    ctx.fillStyle = edge;
    ctx.beginPath(); ctx.arc(0, 0, edgeR, 0, Math.PI*2); ctx.fill();

    // Main void (dark hole)
    const hole = ctx.createRadialGradient(0, 0, 0, 0, 0, this.r);
    hole.addColorStop(0, 'rgba(2, 6, 15, 0.95)');
    hole.addColorStop(0.45, 'rgba(10, 15, 30, 0.9)');
    hole.addColorStop(0.75, 'rgba(15, 23, 42, 0.7)');
    hole.addColorStop(1, 'rgba(30, 41, 59, 0)');
    ctx.fillStyle = hole;
    ctx.beginPath(); ctx.arc(0, 0, this.r, 0, Math.PI*2); ctx.fill();

    // Spinning dashed ring at edge (pulling effect)
    ctx.save();
    ctx.rotate(this.t);
    ctx.strokeStyle = 'rgba(100, 116, 139, 0.45)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6, 8]);
    ctx.beginPath(); ctx.arc(0, 0, this.r * 0.72, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // Inner spinning dashes (opposite direction)
    ctx.save();
    ctx.rotate(-this.t * 1.4);
    ctx.strokeStyle = 'rgba(71, 85, 105, 0.35)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 10]);
    ctx.beginPath(); ctx.arc(0, 0, this.r * 0.4, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // Small question mark in the center (faint)
    const qa = 0.45 + Math.sin(this.t * 2) * 0.15;
    ctx.fillStyle = `rgba(148, 163, 184, ${qa})`;
    ctx.font = F(20, 700);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('?', 0, 0);

    // Label
    ctx.fillStyle = 'rgba(148, 163, 184, 0.75)';
    ctx.font = F(9, 700);
    ctx.textBaseline = 'alphabetic';
    ctx.fillText('KNOWLEDGE GAP', 0, this.r + 14);
    ctx.restore();
  }
}

/* ---------- Retrieval issues (moving blockers) ---------- */
class RetrievalIssue {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.size = 46;
    this.angle = 0;
    this.osc = Math.random() * Math.PI * 2;
    this.hit = false;
  }
  update(speed) {
    this.x -= speed;
    this.angle += 0.06;
    this.osc += 0.04;
    this.y += Math.sin(this.osc) * 1.2;
  }
  hitbox() { return { x: this.x - this.size/2 + 4, y: this.y - this.size/2 + 4, w: this.size - 8, h: this.size - 8 }; }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);

    ctx.shadowColor = 'rgba(245, 158, 11, 0.6)';
    ctx.shadowBlur = 14;

    // Gear / warning
    ctx.fillStyle = C.retrv;
    ctx.beginPath();
    const teeth = 8;
    for (let i = 0; i < teeth * 2; i++) {
      const r = i % 2 === 0 ? this.size * 0.55 : this.size * 0.4;
      const a = (i / (teeth * 2)) * Math.PI * 2;
      const px = Math.cos(a) * r;
      const py = Math.sin(a) * r;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath(); ctx.fill();

    // Inner hole
    ctx.fillStyle = C.bg;
    ctx.beginPath(); ctx.arc(0, 0, this.size * 0.22, 0, Math.PI*2); ctx.fill();

    ctx.shadowBlur = 0;
    ctx.rotate(-this.angle);

    // Exclamation
    ctx.fillStyle = '#1f2937';
    ctx.font = F(22, 700);
    ctx.textAlign = 'center';
    ctx.fillText('!', 0, 8);

    ctx.restore();

    // Label
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.fillStyle = 'rgba(245, 158, 11, 0.9)';
    ctx.font = F(10, 800);
    ctx.textAlign = 'center';
    ctx.fillText('RETRIEVAL ISSUE', 0, this.size + 6);
    ctx.restore();
  }
}

/* ---------- TextBuddy power-up (rare) ---------- */
class TextBuddy {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.size = 72;
    this.bob = Math.random() * Math.PI * 2;
    this.pulse = 0;
    this.collected = false;
  }
  update(speed) {
    this.x -= speed;
    this.bob += 0.05;
    this.pulse = (this.pulse + 0.1) % (Math.PI * 2);
  }
  hitbox() {
    return { x: this.x - this.size/2 + 6, y: this.y - this.size/2 + 6, w: this.size - 12, h: this.size - 12 };
  }
  draw() {
    const y = this.y + Math.sin(this.bob) * 4;
    ctx.save();
    ctx.translate(this.x, y);

    // Strong pink/blue alternating halo (screams power-up)
    const glowR = 70 + Math.sin(this.pulse) * 8;
    const halo = ctx.createRadialGradient(0, 0, 15, 0, 0, glowR);
    const t = (Math.sin(this.pulse) + 1) / 2;
    halo.addColorStop(0, `rgba(247, 180, 174, ${0.55 + t * 0.15})`);
    halo.addColorStop(0.5, `rgba(0, 94, 184, ${0.3 + (1-t) * 0.15})`);
    halo.addColorStop(1, 'rgba(0, 94, 184, 0)');
    ctx.fillStyle = halo;
    ctx.beginPath(); ctx.arc(0, 0, glowR, 0, Math.PI*2); ctx.fill();

    // Rotating sparkle ring
    ctx.save();
    ctx.rotate(this.pulse * 0.5);
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI * 2;
      const r = 42;
      const sx = Math.cos(a) * r;
      const sy = Math.sin(a) * r;
      ctx.fillStyle = i % 2 === 0 ? 'rgba(247, 180, 174, 0.8)' : 'rgba(255, 255, 255, 0.6)';
      ctx.beginPath(); ctx.arc(sx, sy, 2.5, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();

    // TextBuddy mark (canvas-drawn, crisp at any size)
    const markScale = this.size / 90; // 100 logical units fit within this.size
    ctx.save();
    ctx.scale(markScale, markScale);
    drawTextBuddyMark();
    ctx.restore();

    ctx.restore();

    // Label
    ctx.fillStyle = C.pink;
    ctx.font = F(11, 800);
    ctx.textAlign = 'center';
    ctx.fillText('TEXTBUDDY  ·  POWER-UP', this.x, this.y + this.size/2 + 16);
  }
}

    ctx.fillStyle = '#a16207';
    ctx.font = F(11, 800);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('3x', this.w/2 - 21, -this.h/2 + 18);

    // Title
    ctx.fillStyle = '#0f172a';
    ctx.font = F(14, 700);
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    const titleX = -this.w/2 + 16;
    const titleY = -this.h/2 + ribbonH + 14;
    const titleLines = wrapText(this.title, this.w - 32, 14, 700);
    for (let i = 0; i < Math.min(2, titleLines.length); i++) {
      const line = (i === 1 && titleLines.length > 2)
        ? titleLines[i].slice(0, Math.max(0, titleLines[i].length - 3)) + '...'
        : titleLines[i];
      ctx.fillText(line, titleX, titleY + i * 18);
    }

    // Bottom meta
    ctx.fillStyle = '#a16207';
    ctx.font = F(9, 700);
    ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
    ctx.fillText('EDITOR\u2019S PICK  ·  FOUNDA', -this.w/2 + 16, this.h/2 - 12);

    ctx.restore();
  }
}

/* ---------- Negative Feedback (contributes directly to NFR) ---------- */
class NegativeFeedback {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.w = 72; this.h = 68;
    this.bob = Math.random() * Math.PI * 2;
    this.shake = 0;
    this.hit = false;
  }
  update(speed) {
    this.x -= speed;
    this.bob += 0.08;
    this.shake = Math.sin(this.bob * 2.5) * 1;
  }
  hitbox() {
    return { x: this.x - this.w/2 + 6, y: this.y - this.h/2 + 6, w: this.w - 12, h: this.h - 12 };
  }
  draw() {
    ctx.save();
    ctx.translate(this.x + this.shake, this.y);

    // Red aura
    const g = ctx.createRadialGradient(0, 0, 12, 0, 0, 60);
    g.addColorStop(0, 'rgba(239, 68, 68, 0.28)');
    g.addColorStop(1, 'rgba(239, 68, 68, 0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0, 0, 60, 0, Math.PI*2); ctx.fill();

    // Speech bubble body (cleaner - no tail, just rounded)
    ctx.fillStyle = '#dc2626';
    roundRect(ctx, -this.w/2, -this.h/2 + 4, this.w, this.h - 12, 14);
    ctx.fill();
    // Small tail
    ctx.beginPath();
    ctx.moveTo(-14, this.h/2 - 8);
    ctx.lineTo(-24, this.h/2 + 2);
    ctx.lineTo(-4, this.h/2 - 8);
    ctx.closePath();
    ctx.fill();

    // Thumbs down icon (cleaner, centered)
    ctx.fillStyle = C.white;
    const tx = -8, ty = -10;
    ctx.beginPath();
    ctx.moveTo(tx, ty);
    ctx.lineTo(tx + 14, ty);
    ctx.lineTo(tx + 14, ty + 12);
    ctx.lineTo(tx + 10, ty + 18);
    ctx.lineTo(tx + 4, ty + 18);
    ctx.lineTo(tx + 4, ty + 12);
    ctx.lineTo(tx, ty + 12);
    ctx.closePath();
    ctx.fill();
    ctx.fillRect(tx - 4, ty + 2, 3, 8);

    ctx.restore();

    // Label below
    ctx.fillStyle = 'rgba(239, 68, 68, 0.9)';
    ctx.font = F(10, 800);
    ctx.textAlign = 'center';
    ctx.fillText('NEGATIVE FEEDBACK', this.x, this.y + this.h/2 + 14);
  }
}

/* ---------- Answer Portal (appears when target is reached) ---------- */
class AnswerPortal {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.r = 100;
    this.rot = 0;
    this.pulse = 0;
    this.passed = false;
  }
  update(speed) {
    this.x -= speed * 0.7; // portal drifts slower than obstacles
    this.rot += 0.02;
    this.pulse += 0.08;
  }
  hitbox() { return { x: this.x - 40, y: this.y - 40, w: 80, h: 80 }; }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);

    // Outer radial glow
    const glowR = this.r + 30 + Math.sin(this.pulse) * 6;
    const g = ctx.createRadialGradient(0, 0, 30, 0, 0, glowR);
    g.addColorStop(0, 'rgba(247, 180, 174, 0.6)');
    g.addColorStop(0.6, 'rgba(0, 94, 184, 0.3)');
    g.addColorStop(1, 'rgba(0, 94, 184, 0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0, 0, glowR, 0, Math.PI*2); ctx.fill();

    // Rotating outer rings
    ctx.save();
    ctx.rotate(this.rot);
    for (let i = 0; i < 3; i++) {
      ctx.strokeStyle = i % 2 === 0 ? C.pink : C.blue;
      ctx.lineWidth = 3;
      ctx.setLineDash([12, 8]);
      ctx.lineDashOffset = -this.rot * 30 * (i + 1);
      ctx.beginPath();
      ctx.arc(0, 0, this.r - i * 18, 0, Math.PI*2);
      ctx.stroke();
    }
    ctx.setLineDash([]);
    ctx.restore();

    // Inner vortex (filled circle with swirl)
    const inner = ctx.createRadialGradient(0, 0, 5, 0, 0, 50);
    inner.addColorStop(0, 'rgba(247, 180, 174, 0.95)');
    inner.addColorStop(0.6, 'rgba(0, 94, 184, 0.9)');
    inner.addColorStop(1, 'rgba(10, 15, 30, 0.9)');
    ctx.fillStyle = inner;
    ctx.beginPath(); ctx.arc(0, 0, 50, 0, Math.PI*2); ctx.fill();

    // Swirl particles
    ctx.save();
    ctx.rotate(-this.rot * 2);
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI * 2;
      const rr = 28 + Math.sin(this.pulse + i) * 6;
      const px = Math.cos(a) * rr;
      const py = Math.sin(a) * rr;
      ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
      ctx.beginPath(); ctx.arc(px, py, 2, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();

    ctx.restore();

    // Label above
    ctx.fillStyle = C.pink;
    ctx.font = F(13, 700);
    ctx.textAlign = 'center';
    ctx.fillText('DELIVER ANSWER', this.x, this.y - this.r - 10);
  }
}

/* ---------- Answer delivery toast (non-blocking corner notification) ---------- */
class AnswerToast {
  constructor(helpfulness, nfr, quality, missed) {
    this.life = 1;
    this.helpfulness = helpfulness;
    this.nfr = nfr;
    this.quality = quality;
    this.missed = missed || 0;
    this.slideIn = 0;
  }
  update() {
    this.slideIn = Math.min(1, this.slideIn + 0.08);
    this.life -= 0.003; // lasts ~5.5 seconds (was 0.006)
  }
  draw() {
    const a = Math.min(1, this.life * 1.6);
    const hasMissed = this.missed > 0;
    const tw = 280, th = hasMissed ? 118 : 100;
    const targetX = W - tw - 20;
    const tx = W - (W - targetX) * this.slideIn;
    const ty = 100;

    // Panel
    ctx.fillStyle = `rgba(10, 15, 30, ${a * 0.92})`;
    roundRect(ctx, tx, ty, tw, th, 10); ctx.fill();
    ctx.strokeStyle = `rgba(247, 180, 174, ${a * 0.5})`;
    ctx.lineWidth = 1;
    roundRect(ctx, tx, ty, tw, th, 10); ctx.stroke();

    // Left accent bar
    ctx.fillStyle = `rgba(247, 180, 174, ${a})`;
    ctx.save();
    roundRect(ctx, tx, ty, 3, th, 10);
    ctx.clip();
    ctx.fillRect(tx, ty, 3, th);
    ctx.restore();

    ctx.fillStyle = `rgba(247, 180, 174, ${a})`;
    ctx.font = F(10, 800);
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText('ANSWER DELIVERED', tx + 16, ty + 12);

    ctx.fillStyle = `rgba(255, 255, 255, ${a})`;
    ctx.font = F(18, 800);
    ctx.fillText(this.quality, tx + 16, ty + 28);

    ctx.font = F(12, 600);
    ctx.fillStyle = `rgba(34, 197, 94, ${a * 0.95})`;
    ctx.fillText(`Helpfulness  ${this.helpfulness}%`, tx + 16, ty + 56);
    ctx.fillStyle = `rgba(239, 68, 68, ${a * 0.95})`;
    ctx.fillText(`NFR  ${this.nfr}%`, tx + 16, ty + 74);

    if (hasMissed) {
      ctx.fillStyle = `rgba(245, 158, 11, ${a * 0.95})`;
      ctx.font = F(10, 700);
      ctx.fillText(`${this.missed} portal${this.missed > 1 ? 's' : ''} missed`, tx + 16, ty + 94);
    }
  }
}

/* ---------- Particle bursts ---------- */
class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    this.vx = (Math.random() - 0.5) * 8;
    this.vy = (Math.random() - 0.5) * 8 - 2;
    this.life = 1;
    this.color = color;
    this.size = 2 + Math.random() * 3;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.vy += 0.15; this.life -= 0.02;
  }
  draw() {
    ctx.fillStyle = this.color.replace('ALPHA', this.life);
    ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
  }
}

/* ---------- Floating messages ---------- */
class FloatMsg {
  constructor(x, y, text, color) {
    this.x = x; this.y = y; this.text = text; this.color = color;
    this.life = 1;
  }
  update() { this.y -= 1.2; this.life -= 0.014; }
  draw() {
    ctx.fillStyle = this.color.replace('ALPHA', this.life.toFixed(2));
    ctx.font = F(16, 700);
    ctx.textAlign = 'center';
    ctx.fillText(this.text, this.x, this.y);
  }
}

  // Level 0: 5s, Level 1: 6s, Level 2: 7s, Level 3+: 8s
  const secs = Math.min(8, 5 + world.level);
  return secs * 60;
}

const dany = new DanyAI();

/* ---------- Practice tutorial ---------- */
const tutorial = {
  step: 0,        // 0=flap, 1=catch, 2=avoid, 3=portal, 4=done
  stepFrame: 0,
  flaps: 0,
  catches: 0,
  avoided: 0,
  delivered: false,
  spawnTimer: 0,
  doneFrame: 0
};
const TUTORIAL_STEPS = [
  { title: '1 / 4  ·  FLAP',
    line1: 'Tap SPACE (or the screen) to flap.',
    line2: 'Each tap raises Dany. Try 5 taps to continue.',
    timeout: 720 },
  { title: '2 / 4  ·  CATCH ARTICLES',
    line1: 'Catch good articles to build your answer.',
    line2: 'Grab 3 to continue.',
    timeout: 900 },
  { title: '3 / 4  ·  AVOID DETRACTORS',
    line1: 'Outdated articles, gaps, retrieval issues, bad feedback.',
    line2: 'Dodge 4 to continue (you can’t die in the tutorial).',
    timeout: 1080 },
  { title: '4 / 4  ·  DELIVER THE ANSWER',
    line1: 'When confidence is high, a portal appears.',
    line2: 'Fly through it to deliver.',
    timeout: 720 },
  { title: 'YOU’RE READY',
    line1: 'Press SPACE (or tap) to return to the start screen.',
    line2: '',
    timeout: 600 }
];

function beginTutorial() {
  state = STATE.TUTORIAL;
  dany.reset();
  dany.invul = 99999;
  world.goods = []; world.bads = []; world.gaps = []; world.retrs = []; world.negs = [];
  world.buddies = []; world.featured = [];
  world.portals = []; world.particles = []; world.msgs = []; world.flashes = [];
  world.speed = 2.6;
  world.question = QUESTIONS[0];
  tutorial.step = 0;
  tutorial.stepFrame = 0;
  tutorial.flaps = 0;
  tutorial.catches = 0;
  tutorial.avoided = 0;
  tutorial.delivered = false;
  tutorial.spawnTimer = 60;
  tutorial.doneFrame = 0;
}

function advanceTutorialStep() {
  tutorial.step++;
  tutorial.stepFrame = 0;
  tutorial.spawnTimer = 60;
  // Clear field between steps so next step is clean
  world.goods = []; world.bads = []; world.gaps = []; world.retrs = []; world.negs = [];
  world.portals = [];
  if (tutorial.step >= TUTORIAL_STEPS.length - 1) {
    tutorial.doneFrame = 1;
  }
}

function updateTutorial() {
  tutorial.stepFrame++;

  // Tick visuals always
  for (const p of world.particles) p.update();
  world.particles = world.particles.filter(p => p.life > 0);
  for (const m of world.msgs) m.update();
  world.msgs = world.msgs.filter(m => m.life > 0);

  // Dany physics, but immortal
  dany.invul = 99999;
  dany.update();

  const speed = world.speed;
  const step = tutorial.step;
  const cur = TUTORIAL_STEPS[step];

  // Step 0 — Flap practice (no spawns)
  if (step === 0) {
    if (tutorial.flaps >= 5 || tutorial.stepFrame > cur.timeout) advanceTutorialStep();
    return;
  }

  // Step 1 — Catch good articles
  if (step === 1) {
    if (tutorial.spawnTimer-- <= 0) {
      const title = world.question.good[Math.floor(Math.random() * world.question.good.length)];
      world.goods.push(new GoodArticle(W + 40, 140 + Math.random() * (H - 280), title));
      tutorial.spawnTimer = 95;
    }
    for (const g of world.goods) g.update(speed);
    for (const g of world.goods) {
      if (!g.collected && hits(dany.hitbox(), g.hitbox())) {
        g.collected = true;
        tutorial.catches++;
        sfx.good();
        for (let i = 0; i < 14; i++) world.particles.push(new Particle(g.x, g.y, 'rgba(34, 197, 94, ALPHA)'));
        world.msgs.push(new FloatMsg(g.x, g.y - 40, '+1 article!', 'rgba(34, 197, 94, ALPHA)'));
      }
    }
    world.goods = world.goods.filter(g => !g.collected && g.x > -120);
    if (tutorial.catches >= 3 || tutorial.stepFrame > cur.timeout) advanceTutorialStep();
    return;
  }

  // Step 2 — Avoid detractors (cycles through types)
  if (step === 2) {
    if (tutorial.spawnTimer-- <= 0) {
      const y = 140 + Math.random() * (H - 280);
      const idx = tutorial.avoided + (tutorial.spawnTimer < -200 ? 0 : 0);
      const seq = ['bad', 'gap', 'retr', 'neg'];
      const kind = seq[idx % seq.length];
      if (kind === 'bad') {
        const title = world.question.bad[Math.floor(Math.random() * world.question.bad.length)];
        world.bads.push(new BadArticle(W + 40, y, title));
      } else if (kind === 'gap') {
        world.gaps.push(new KnowledgeGap(W + 60, y));
      } else if (kind === 'retr') {
        world.retrs.push(new RetrievalIssue(W + 40, y));
      } else if (kind === 'neg') {
        world.negs.push(new NegativeFeedback(W + 40, y));
      }
      tutorial.spawnTimer = 110;
    }
    // Update + count anything that exits the screen as "avoided"
    for (const arr of [world.bads, world.gaps, world.retrs, world.negs]) {
      for (const e of arr) e.update(speed);
    }
    const countOut = (arr) => {
      let cnt = 0;
      for (const e of arr) if (e.x < -100) cnt++;
      return cnt;
    };
    const outBefore = tutorial.avoided;
    const exits = countOut(world.bads) + countOut(world.gaps) + countOut(world.retrs) + countOut(world.negs);
    tutorial.avoided = outBefore + exits;
    world.bads = world.bads.filter(e => e.x > -100);
    world.gaps = world.gaps.filter(e => e.x > -100);
    world.retrs = world.retrs.filter(e => e.x > -100);
    world.negs = world.negs.filter(e => e.x > -100);
    if (tutorial.avoided >= 4 || tutorial.stepFrame > cur.timeout) advanceTutorialStep();
    return;
  }

  // Step 3 — Deliver the answer (portal)
  if (step === 3) {
    if (world.portals.length === 0 && tutorial.spawnTimer-- <= 0) {
      const py = Math.max(160, Math.min(H - 160, dany.y));
      world.portals.push(new AnswerPortal(W + 80, py));
      tutorial.spawnTimer = 9999;
    }
    for (const p of world.portals) p.update(speed);
    for (const p of world.portals) {
      if (!p.passed && hits(dany.hitbox(), p.hitbox())) {
        p.passed = true;
        tutorial.delivered = true;
        for (let i = 0; i < 30; i++) {
          world.particles.push(new Particle(p.x, p.y, 'rgba(247, 180, 174, ALPHA)'));
          world.particles.push(new Particle(p.x, p.y, 'rgba(0, 94, 184, ALPHA)'));
        }
        sfx.win();
      }
    }
    world.portals = world.portals.filter(p => !p.passed && p.x > -200);
    if (tutorial.delivered || tutorial.stepFrame > cur.timeout) advanceTutorialStep();
    return;
  }

  // Step 4 — Done
  if (step >= TUTORIAL_STEPS.length - 1) {
    tutorial.doneFrame++;
    if (tutorial.doneFrame > cur.timeout) goToBoot();
    return;
  }
}

/* ---------- Spawning logic ---------- */
function spawnWave() {
  const q = world.question;
  const safeY = () => 100 + Math.random() * (H - 200);
  const lvl = world.level;

  // Soft tutorial: first 5s of the very first question — only good articles + maybe one buddy.
  // Lets new players learn the flap mechanic without dying immediately.
  const inSoftTutorial = lvl === 0 && world.roundFrames < 300;
  if (inSoftTutorial) {
    const title = q.good[Math.floor(Math.random() * q.good.length)];
    world.goods.push(new GoodArticle(W + 40, safeY(), title));
    if (Math.random() < 0.05 && world.buddyCooldown <= 0 && world.roundFrames > 120) {
      world.buddies.push(new TextBuddy(W + 40, safeY()));
      world.buddyCooldown = 1200;
    }
    return;
  }

  const r = Math.random();
  // Weighted spawn - tougher: ~26% good early, drops to ~16%
  const pGood = Math.max(0.16, 0.26 - lvl * 0.02);
  const pBad  = 0.22 + lvl * 0.015;
  const pGap  = 0.18 + lvl * 0.010;
  const pNeg  = 0.18 + lvl * 0.010;

  if (r < pGood) {
    const title = q.good[Math.floor(Math.random() * q.good.length)];
    // Small chance of featured (5%) when article would spawn, and cooldown gate
    if (Math.random() < 0.05 && world.featuredCooldown <= 0) {
      world.featured.push(new FeaturedArticle(W + 40, safeY(), title));
      world.featuredCooldown = 600; // ~10s at 60fps
    } else {
      world.goods.push(new GoodArticle(W + 40, safeY(), title));
    }
  } else if (r < pGood + pBad) {
    const title = q.bad[Math.floor(Math.random() * q.bad.length)];
    world.bads.push(new BadArticle(W + 40, safeY(), title));
  } else if (r < pGood + pBad + pGap) {
    world.gaps.push(new KnowledgeGap(W + 60, safeY()));
  } else if (r < pGood + pBad + pGap + pNeg) {
    world.negs.push(new NegativeFeedback(W + 40, safeY()));
  } else {
    world.retrs.push(new RetrievalIssue(W + 40, safeY()));
  }

  // TextBuddy very rare: ~3% per spawn, with cooldown
  if (Math.random() < 0.03 && world.buddyCooldown <= 0 && !world.portalSpawned) {
    world.buddies.push(new TextBuddy(W + 40, safeY()));
    world.buddyCooldown = 1200; // ~20s at 60fps
  }

  // Detractor cluster (more frequent as levels progress)
  if (Math.random() < 0.12 + lvl * 0.015) {
    const baseY = safeY();
    const pickType = Math.random();
    if (pickType < 0.35) {
      world.gaps.push(new KnowledgeGap(W + 80, baseY));
    } else if (pickType < 0.65) {
      world.retrs.push(new RetrievalIssue(W + 60, baseY));
    } else if (pickType < 0.85) {
      world.negs.push(new NegativeFeedback(W + 60, baseY));
    } else {
      const title = q.bad[Math.floor(Math.random() * q.bad.length)];
      world.bads.push(new BadArticle(W + 60, baseY, title));
    }
  }
}

/* ---------- Collision ---------- */
function hits(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

/* ---------- Level flow (continuous, no loading screens) ---------- */
function beginQuestion() {
  // Start a new 2-minute session
  world.level = 0;
  world.score = 0;
  world.maxCombo = 0;
  world.questionsAnswered = 0;
  world.qualitySum = 0;
  world.sessionTime = SESSION_DURATION_FRAMES;
  world.shield = 0;
  world.buddyCooldown = 0;
  world.featuredCooldown = 0;
  world.featured = [];
  world.buddies = [];
  world.question = QUESTIONS[world.level % QUESTIONS.length];
  resetRound();
  world.awaitingStart = true;
  world.roundFrames = 0;
  state = STATE.PLAY;
}

/* ---------- Leaderboard (Supabase global, localStorage fallback) ---------- */
const LEADERBOARD_KEY = 'dany_runner_leaderboard_v1';
function loadLocalBoard() {
  try {
    const raw = localStorage.getItem(LEADERBOARD_KEY);
    if (!raw) return [];
    return JSON.parse(raw) || [];
  } catch (e) { return []; }
}
function saveLocalBoard(entries) {
  try { localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(entries.slice(0, 10))); } catch (e) {}
}

function finalizeAndStartNameEntry() {
  const avgQuality = world.questionsAnswered > 0
    ? Math.round(world.qualitySum / world.questionsAnswered)
    : 0;
  world.finalEntry = {
    score: world.score,
    questions: world.questionsAnswered,
    avg_quality: avgQuality,
    max_combo: world.maxCombo
  };
  // Score 0 — skip name entry, show simple over screen
  if (world.score <= 0) {
    state = STATE.OVER;
    return;
  }
  nameEntry.text = '';
  nameEntry.submitting = false;
  nameEntry.submitted = false;
  state = STATE.NAME_ENTRY;
  if (nameInput) nameInput.value = '';
  // On mobile, swap canvas-drawn name UI for a real HTML form
  showMobileNameEntry();
}

function endSession() {
  finalizeAndStartNameEntry();
  sfx.win();
}

async function loadLeaderboardForBoot() {
  let board = await supabaseFetchTop(10);
  if (board.length === 0) board = loadLocalBoard().slice(0, 10);
  world.topBoard = board;
}

const USER_COUNTRY_KEY = 'dany_runner_user_country_v1';
async function detectAndSetUserCountry() {
  let cc = null;
  try { cc = localStorage.getItem(USER_COUNTRY_KEY); } catch (_) {}
  if (!cc) {
    try {
      const res = await fetch('https://api.country.is/', { cache: 'no-store' });
      if (res.ok) {
        const data = await res.json();
        if (data && data.country) cc = data.country;
      }
    } catch (_) {}
  }
  if (!cc) {
    const lang = navigator.language || '';
    const parts = lang.split('-');
    if (parts.length >= 2) cc = parts[1].toUpperCase();
  }
  if (!cc) return;
  try { localStorage.setItem(USER_COUNTRY_KEY, cc); } catch (_) {}
  const idx = COUNTRIES.indexOf(cc);
  if (idx >= 0) nameEntry.countryIdx = idx;
}

async function submitAndShowLeaderboard() {
  nameEntry.submitting = true;
  if (typeof mneSyncSubmitState === 'function') mneSyncSubmitState();
  const entry = {
    name: getEnteredName(),
    country: COUNTRIES[nameEntry.countryIdx],
    score: world.finalEntry.score,
    questions: world.finalEntry.questions,
    avg_quality: world.finalEntry.avg_quality,
    max_combo: world.finalEntry.max_combo
  };

  // Submit to Supabase
  await supabaseSubmit(entry);

  // Fetch global top 10
  let board = await supabaseFetchTop(10);

  // Fallback to localStorage if Supabase not configured or failed
  if (board.length === 0) {
    const localEntry = { ...entry, created_at: new Date().toISOString() };
    const local = loadLocalBoard();
    local.push(localEntry);
    local.sort((a, b) => b.score - a.score);
    saveLocalBoard(local);
    board = local.slice(0, 10);
  }

  world.topBoard = board;
  world.finalRank = board.findIndex(e =>
    e.name === entry.name && e.score === entry.score && e.country === entry.country
  );
  nameEntry.submitting = false;
  nameEntry.submitted = true;
  if (typeof hideMobileNameEntry === 'function') hideMobileNameEntry();
  state = STATE.SESSION_END;
}
function tryFlapStart() {
  // Used only from boot / game over
  beginQuestion();
}
function advanceToNextQuestion() {
  world.level++;
  world.question = QUESTIONS[world.level % QUESTIONS.length];
  world.awaitingStart = true;
  world.roundFrames = 0;
  // Reset round state but keep session totals (score, maxCombo, questionsAnswered)
  world.goods = []; world.bads = []; world.gaps = []; world.retrs = []; world.negs = [];
  world.buddies = []; world.featured = [];
  world.portals = [];
  world.collected = 0; world.mistakes = 0; world.nfrHits = 0; world.confidence = 0;
  world.portalMissed = 0;
  world.combo = 0;
  world.spawnTimer = 30;
  world.portalSpawned = false;
  world.questionBannerAnim = 1;
  world.readDuration = getReadDuration();
  world.readTimer = world.readDuration;
  dany.invul = 90;
}
function spawnPortal() {
  world.portalSpawned = true;
  const py = Math.max(120, Math.min(H - 120, dany.y));
  world.portals.push(new AnswerPortal(W + 100, py));
  // Clear all obstacles and power-ups (keep good articles so player can catch extras on the way)
  world.bads = [];
  world.gaps = [];
  world.retrs = [];
  world.negs = [];
  world.buddies = [];
}
function deliverAnswer() {
  const total = world.collected + world.mistakes;
  const helpfulness = total === 0 ? 100 : Math.round((world.collected / total) * 100);
  const nfr = total === 0 ? 0 : Math.round((world.mistakes / total) * 100);
  const quality = world.confidence >= 90 ? 'Excellent' :
                  world.confidence >= 70 ? 'Strong' :
                  world.confidence >= 50 ? 'Acceptable' : 'Weak';
  world.score += 500 + Math.round(world.confidence * 5);
  world.questionsAnswered++;
  world.qualitySum += world.confidence;
  world.flashes.push(new AnswerToast(helpfulness, nfr, quality, world.portalMissed || 0));
  sfx.win();
  advanceToNextQuestion();
}
function gameOver(reason) {
  if (state !== STATE.PLAY) return;
  world.overReason = reason || 'Run ended.';
  finalizeAndStartNameEntry();
  sfx.over();
}
function resetAll() {
  beginQuestion();
}

/* ---------- Full reset back to boot screen ---------- */

  state = STATE.BOOT;
  world.goods = []; world.bads = []; world.gaps = []; world.retrs = []; world.negs = [];
  world.buddies = []; world.featured = [];

  world.particles = []; world.msgs = [];
  world.level = 0;
  world.score = 0;
  world.collected = 0;
  world.mistakes = 0;
  world.nfrHits = 0;
  world.confidence = 0;
  world.combo = 0;
  world.maxCombo = 0;
  world.questionsAnswered = 0;
  world.qualitySum = 0;
  world.sessionTime = SESSION_DURATION_FRAMES;
  world.shield = 0;
  world.portalSpawned = false;
  world.portalMissed = 0;
  world.buddyCooldown = 0;
  world.featuredCooldown = 0;
